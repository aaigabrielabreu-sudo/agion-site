<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simule o seu consórcio — Agion Consórcios</title>
<meta name="description" content="Consórcio sem juros para imóvel, automóvel, terreno e investimento. Simule agora e fale na hora pelo WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
 --petro:#0B2A26; --petro2:#103F38; --petro3:#155A50;
 --gold:#C5A059; --gold2:#E8CC8B; --gold3:#F4E6C0;
 --ink:#1C2B2E; --muted:#5E7173; --line:#E6EAE9; --bg:#fff; --bg2:#F3F6F5;
 --gg:linear-gradient(115deg,#A8853E,#E8CC8B 50%,#C5A059 90%);
 --gp:linear-gradient(155deg,#12473F,#0B2A26);
 --serif:'Cinzel',serif; --lora:'Lora',serif; --sans:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
a{text-decoration:none;color:inherit}
h1,h2,h3,h4{font-family:var(--lora)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border-radius:999px;font-weight:700;font-size:.95rem;padding:14px 28px;cursor:pointer;border:none;transition:.25s}
.btn-gold{background:var(--gg);color:#2a2113;box-shadow:0 10px 26px rgba(197,160,89,.35)}
.btn-gold:hover{filter:brightness(1.06);transform:translateY(-2px)}
.btn-ghost{background:transparent;border:1.5px solid var(--gold);color:var(--petro)}
.btn-ghost:hover{background:var(--gold);color:#2a2113}
.svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sec{padding:74px 0}
.sec-head{text-align:center;max-width:680px;margin:0 auto 44px}
.sec-head .tag{display:inline-flex;align-items:center;gap:8px;font-size:.74rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:rgba(197,160,89,.1);border:1px solid rgba(197,160,89,.3);border-radius:999px;padding:6px 15px;margin-bottom:16px}
.sec-head h2{font-size:clamp(1.7rem,3.2vw,2.5rem);color:var(--petro);line-height:1.15}
.sec-head h2 em{font-style:normal;color:var(--gold)}
.sec-head p{color:var(--muted);margin-top:12px;font-size:1.02rem}

/* topbar + nav */
.topbar{background:var(--petro);color:#cfe0dd;font-size:.82rem}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;height:40px}
.topbar a{color:#cfe0dd;display:inline-flex;gap:7px;align-items:center}
.topbar .gold{color:var(--gold2);font-weight:700}
.nav{background:linear-gradient(180deg,#0B2A26,#12473F);border-bottom:1.5px solid rgba(232,204,139,.34);position:sticky;top:0;z-index:30}
.nav .wrap{display:flex;align-items:center;gap:24px;height:76px}
.brand{display:flex;flex-direction:row;align-items:center;gap:12px;margin-right:auto}
.brand-mark{width:56px;height:56px;flex:0 0 auto;display:grid;place-items:center}
.brand-mark img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.35))}
.brand-txt{display:flex;flex-direction:column;line-height:1}
.brand-txt b{font-family:var(--serif);font-size:1.4rem;color:#fff;letter-spacing:.5px;font-weight:800}
.brand-txt small{font-size:.58rem;letter-spacing:.16em;color:var(--gold2);text-transform:uppercase;margin-top:4px;font-weight:600}
.nav-links{display:flex;gap:18px;list-style:none}
.nav-links a{font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#eef5f3;cursor:pointer;white-space:nowrap}
.nav-links a:hover{color:var(--gold2)}
.nav .btn-ghost{border-color:var(--gold);color:var(--gold2)}
.nav .btn-ghost:hover{background:var(--gold);color:#2a2113}
/* hambúrguer (mobile) */
.nav-burger{display:none;flex-direction:column;gap:5px;width:44px;height:44px;border:1.5px solid rgba(232,204,139,.45);border-radius:11px;background:transparent;cursor:pointer;align-items:center;justify-content:center}
.nav-burger span{display:block;width:20px;height:2px;background:var(--gold2);border-radius:2px}
/* menu mobile (dropdown de abas) */
.nav-mobile{display:none;flex-direction:column;background:#0B2A26;border-bottom:1.5px solid rgba(232,204,139,.3)}
.nav-mobile a{padding:14px 22px;color:#eef5f3;font-weight:700;font-size:.84rem;text-transform:uppercase;letter-spacing:.05em;border-top:1px solid rgba(255,255,255,.06);cursor:pointer}
.nav-mobile a:hover{color:var(--gold2);background:rgba(255,255,255,.04)}
.nav-mobile.open{display:flex}
.nav-mobile .nm-login{color:var(--gold2)}
/* atalhos 3 colunas abaixo do navbar (mobile) */
.quicknav{display:none;grid-template-columns:1fr 1fr 1fr;background:linear-gradient(180deg,#12473F,#0B2A26);border-bottom:1.5px solid rgba(232,204,139,.3)}
.quicknav a{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 6px;color:#eef5f3;font-weight:700;font-size:.74rem;letter-spacing:.02em;cursor:pointer;border-right:1px solid rgba(255,255,255,.10);text-align:center}
.quicknav a:last-child{border-right:none}
.quicknav a:active{background:rgba(197,160,89,.18)}
.quicknav a .svg{width:16px;height:16px;color:var(--gold2);flex:0 0 auto}
@media(max-width:980px){.nav-links,.nav .btn-ghost{display:none}.nav-burger{display:flex}.quicknav{display:grid}}

/* HERO petróleo full-bleed, form branco à esquerda */
.hero{background:url(/agion-wm.png) 0 0/240px repeat,var(--gp);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,rgba(197,160,89,.22),transparent 62%);top:-260px;right:-150px;animation:float1 10s ease-in-out infinite;z-index:0;pointer-events:none}
.hero::after{content:"";position:absolute;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(34,118,106,.55),transparent 60%);bottom:-200px;left:-120px;animation:float1 13s ease-in-out infinite reverse;z-index:0;pointer-events:none}
@keyframes float1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
.hero .wrap{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,440px) 1fr;align-items:center;gap:48px;padding:54px 22px 62px}
.form-card{background:#fff;border-radius:20px;box-shadow:0 30px 70px rgba(0,0,0,.3);padding:34px 30px;width:100%;max-width:none;text-align:left}
.form-card h1,.form-card .fh1{font-family:var(--lora);font-size:1.7rem;color:var(--petro);line-height:1.18;margin:0}
.form-card h1 em,.form-card .fh1 em{font-style:normal;color:var(--gold)}
.form-card .sub{color:var(--muted);font-size:.92rem;margin:10px 0 20px}
.f{margin-bottom:13px}
.f label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--petro);margin-bottom:6px}
.f select,.f input{width:100%;height:50px;border:1.5px solid var(--line);border-radius:11px;padding:0 15px;font-size:.98rem;font-family:inherit;color:var(--ink);background:#fff}
.f select:focus,.f input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(197,160,89,.16)}
.minv{font-size:.76rem;color:var(--muted);margin:-4px 0 14px}
.form-card .btn-gold{width:100%;height:54px;font-size:1rem;text-transform:uppercase;letter-spacing:.04em}
.hero-right{color:#fff}
.hero-kicker{display:inline-block;font-family:var(--serif);font-size:.78rem;font-weight:800;letter-spacing:.22em;text-transform:uppercase;margin-bottom:16px;background:linear-gradient(100deg,#fff,#E8CC8B 50%,#C5A059 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:hueShift 5s ease-in-out infinite}
@keyframes hueShift{0%,100%{background-position:0 0}50%{background-position:100% 0}}
.hero-h1{font-family:var(--serif);font-size:clamp(1.7rem,3vw,2.6rem);line-height:1.12;text-transform:uppercase;color:#fff;margin-bottom:14px}
.hero-h1 b{color:var(--gold2)}
.hero-right p{color:#cfe0dd;max-width:500px;font-size:1.04rem}
.hero-trust{display:flex;flex-direction:column;gap:13px;margin-top:28px}
.hero-trust>span{display:flex;align-items:center;gap:15px;color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3;background:rgba(255,255,255,.06);border:1.5px solid rgba(232,204,139,.38);border-left:4px solid var(--gold);border-radius:6px;padding:15px 18px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.hero-trust .tt{text-align:left}
.hero-trust b{color:var(--gold2)}
.hero-trust .ti{width:42px;height:42px;border-radius:6px;background:var(--gg);display:grid;place-items:center;flex:0 0 auto;box-shadow:0 6px 16px rgba(197,160,89,.42)}
.hero-trust .ti svg{color:var(--petro);width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.seals{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;max-width:640px;margin:32px auto 0}
.seal{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(255,255,255,.06);border:1px solid rgba(197,160,89,.45);border-radius:16px;padding:20px 12px 18px;text-align:center}
.seal .ring{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold);display:grid;place-items:center;margin:0 auto 12px;color:var(--gold2)}
.seal b{display:block;color:#fff;font-size:.82rem;font-family:var(--sans);line-height:1.2}
.seal span{display:block;color:#9fb6b2;font-size:.68rem;margin-top:3px}
@media(max-width:900px){.hero .wrap{grid-template-columns:1fr;gap:30px;text-align:center}.form-card{max-width:500px;margin:0 auto}.hero-trust{align-items:center}.hero-right p{margin:0 auto}}
@media(max-width:560px){.hero .wrap{padding:34px 16px 40px;gap:26px}.hero-h1{font-size:1.55rem}}

/* Consórcio imobiliário — 3 cards */
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 22px;text-align:center;box-shadow:0 8px 24px rgba(12,34,40,.05);transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(12,34,40,.12);border-color:rgba(197,160,89,.4)}
.card .ic{width:56px;height:56px;border-radius:15px;background:var(--gg);display:grid;place-items:center;margin:0 auto 14px;color:var(--petro)}
.card h3{font-size:1.1rem;color:var(--petro);margin-bottom:7px}
.card p{color:var(--muted);font-size:.86rem;margin-bottom:16px;line-height:1.5}
@media(max-width:860px){.cards3{grid-template-columns:1fr 1fr;gap:12px}}
@media(max-width:520px){.cards3{grid-template-columns:1fr}}

/* O caminho certo (empresa) + pilares */
.about{background:var(--bg2)}
.about .wrap{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:center}
.about h2{font-size:clamp(1.7rem,3vw,2.4rem);color:var(--petro);line-height:1.15}
.about h2 em{font-style:normal;color:var(--gold)}
.about p{color:var(--muted);margin-top:14px;line-height:1.7}
.pillars{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.pill{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px 20px}
.pill .ic{width:46px;height:46px;border-radius:12px;background:rgba(197,160,89,.12);display:grid;place-items:center;color:var(--gold);margin-bottom:12px}
.pill h4{color:var(--petro);font-size:1.05rem;margin-bottom:6px}
.pill p{color:var(--muted);font-size:.86rem;margin:0;line-height:1.55}
@media(max-width:860px){.about .wrap{grid-template-columns:1fr;gap:28px}}

/* Como funciona — 4 passos */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.step{background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px 22px 26px;position:relative}
.step .n{position:absolute;top:-15px;left:24px;width:34px;height:34px;border-radius:50%;background:var(--gg);color:var(--petro);display:grid;place-items:center;font-weight:800;font-family:var(--sans);box-shadow:0 8px 18px rgba(197,160,89,.4)}
.step .ic{width:54px;height:54px;border-radius:15px;background:rgba(12,34,40,.05);display:grid;place-items:center;color:var(--petro2);margin:8px 0 14px}
.step h4{color:var(--petro);font-size:1.08rem;margin-bottom:8px}
.step p{color:var(--muted);font-size:.85rem;line-height:1.55}
@media(max-width:860px){.steps{grid-template-columns:1fr 1fr;gap:26px 18px}}
@media(max-width:520px){.steps{grid-template-columns:1fr}}

/* FAQ (no lugar das cartas) */
.faqwrap{max-width:840px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
details{background:#fff;border:1px solid var(--line);border-radius:14px;padding:2px 22px;transition:.2s}
details[open]{border-color:rgba(197,160,89,.5);box-shadow:0 10px 26px rgba(12,34,40,.07)}
summary{cursor:pointer;list-style:none;padding:18px 0;font-weight:700;color:var(--petro);font-size:1.02rem;display:flex;justify-content:space-between;gap:12px}
summary::-webkit-details-marker{display:none}
summary::after{content:"+";color:var(--gold);font-size:1.4rem;line-height:1}
details[open] summary::after{content:"–"}
details .a{color:var(--muted);padding:0 0 18px;line-height:1.65}
.trust-chips{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:30px}
.chip{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:11px 18px;font-size:.85rem;color:var(--petro);font-weight:600}
.chip .svg{width:18px;height:18px;color:var(--gold)}

/* Depoimentos */
.depo{background:var(--bg2)}
.depos{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.dcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 24px}
.dcard .stars{color:var(--gold);letter-spacing:3px;margin-bottom:10px}
.dcard p{color:var(--ink);font-style:italic;line-height:1.6}
.dcard .who{margin-top:14px;font-weight:700;color:var(--petro);font-size:.92rem}
.dcard .city{color:var(--muted);font-size:.8rem}
@media(max-width:860px){.depos{grid-template-columns:1fr}}

/* CTA + footer */
.ctaband{background:url(/agion-wm.png) 0 0/240px repeat,var(--gp);color:#fff;text-align:center;position:relative;overflow:hidden}
.ctaband::after{content:"";position:absolute;inset:0;background:radial-gradient(50% 70% at 50% 0%,rgba(197,160,89,.18),transparent 70%)}
.ctaband .wrap{position:relative;z-index:1}
.ctaband h2{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.3rem);text-transform:uppercase}
.ctaband h2 em{color:var(--gold2);font-style:normal}
.ctaband p{color:#cfe0dd;max-width:560px;margin:14px auto 26px}
footer{background:url(/agion-wm.png) 0 0/240px repeat,var(--petro);color:#9fb6b2;padding:48px 0 26px;font-size:.88rem}
footer .cols{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:32px;padding-bottom:26px;border-bottom:1px solid rgba(255,255,255,.08)}
footer b.fb{font-family:var(--serif);color:#fff;font-size:1.3rem}
footer h5{color:#fff;margin-bottom:12px;font-family:var(--sans);font-size:.95rem}
footer a{display:block;color:#9fb6b2;padding:4px 0}footer a:hover{color:var(--gold2)}
footer .base{padding-top:18px;text-align:center;color:#7c918e;font-size:.8rem}
@media(max-width:860px){footer .cols{grid-template-columns:1fr 1fr}}
/* carrossel administradoras (faixa única) */
.adms{background:#fff;border-bottom:1px solid var(--line);padding:14px 0}
.adms-l{text-align:center;color:var(--muted);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.adms .lp{background:transparent;border:none;box-shadow:none}
.parceiras{width:100%;max-width:940px;text-align:center}
.parceiras .pl{color:#9fb6b2;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.marquee{width:100%;max-width:1000px;overflow:hidden;-webkit-mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}
.marquee .track{display:flex;gap:18px;width:max-content;animation:mq 34s linear infinite}
.marquee:hover .track{animation-play-state:paused}
.lp{flex:0 0 auto;background:transparent;height:60px;width:auto;display:grid;place-items:center;padding:0 7px;box-shadow:none;border:none}
.lp img{max-height:50px;max-width:150px;object-fit:contain}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
/* comparação especialista x vendedor */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:920px;margin:0 auto}
.cmp{border-radius:18px;padding:30px 26px;border:1px solid var(--line)}
.cmp.win{background:url(/agion-wm.png) 0 0/240px repeat,var(--gp);color:#fff;border-color:transparent;box-shadow:0 20px 44px rgba(12,34,40,.18)}
.cmp.lose{background:#fff}
.cmp h3{font-size:1.18rem;margin-bottom:16px}
.cmp.win h3{color:#fff}.cmp.lose h3{color:var(--petro)}
.cmp ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.cmp li{display:flex;gap:11px;align-items:flex-start;font-size:.92rem;line-height:1.45}
.cmp.win li{color:#dfeae8}.cmp.lose li{color:var(--muted)}
.cmp .mk{flex:0 0 auto;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:.78rem;margin-top:1px}
.cmp.win .mk{background:rgba(197,160,89,.22);color:var(--gold2)}
.cmp.lose .mk{background:#F2E2E0;color:#C0584E}
@media(max-width:860px){.compare{grid-template-columns:1fr}}
.pv{background:#08231F;color:#cfe0dd;text-align:center;font-size:.82rem;padding:9px}.pv b{color:var(--gold2)}

/* ===== Informações em VERDE-PETRÓLEO dinâmico ===== */
.card,.pill,.step,.dcard,details,.chip{
  position:relative;
  background:linear-gradient(135deg,#0B2A26 0%,#12473F 52%,#16665B 100%)!important;
  background-size:200% 200%!important;animation:petroShift 14s ease infinite;
  -webkit-backdrop-filter:blur(10px) saturate(1.2);backdrop-filter:blur(10px) saturate(1.2);
  border:1.5px solid rgba(232,204,139,.55)!important;
  box-shadow:0 12px 34px rgba(8,24,28,.30),inset 0 1px 0 rgba(255,255,255,.12)!important;
}
@keyframes petroShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
/* faixa dourada superior — assinatura da marca (dinamismo) */
.card,.pill,.dcard,details{overflow:hidden}
.card::before,.pill::before,.dcard::before,details::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--gg);box-shadow:0 0 14px rgba(197,160,89,.45);z-index:2}
/* texto claro dentro das informações */
.card h3,.pill h4,.step h4,.dcard .who,summary{color:#fff!important}
.chip{color:#eef5f3!important;animation:none!important;background-size:auto!important}
.card p,.pill p,.step p,.dcard p,details .a{color:#cfe0dd!important}
.dcard p{font-style:italic}
.dcard .city{color:#9fb6b2!important}
.chip .svg,summary::after{color:var(--gold2)!important}
/* ícones com contraste sobre petróleo */
.step .ic{background:rgba(255,255,255,.10)!important;color:var(--gold2)!important}
.pill .ic{background:rgba(232,204,139,.18)!important;color:var(--gold2)!important}
.card .ic{color:var(--petro)!important}
/* botão "Consulte" dentro do card petróleo — texto branco, borda dourada */
.card .btn-ghost{border-color:var(--gold)!important;color:#fff!important}
.card .btn-ghost:hover{background:var(--gold)!important;color:#2a2113!important}
/* ícones maiores — preenchendo o quadrado dourado */
.card .ic{width:60px;height:60px}
.card .ic .svg,.card .ic svg{width:34px!important;height:34px!important;stroke-width:1.9}
.pill .ic .svg,.pill .ic svg{width:28px!important;height:28px!important;stroke-width:1.9}
.step .ic .svg,.step .ic svg{width:32px!important;height:32px!important;stroke-width:1.9}
.card:hover,.pill:hover,.step:hover,.dcard:hover{border-color:var(--gold)!important;transform:translateY(-6px);box-shadow:0 22px 50px rgba(8,24,28,.40),0 0 32px rgba(197,160,89,.20)!important}
details[open]{border-color:var(--gold)!important}

/* dinamismo do petróleo nas faixas grandes */
.ctaband::after{animation:float1 11s ease-in-out infinite!important}
.cmp.win{background:url(/agion-wm.png) 0 0/240px repeat,linear-gradient(135deg,#0B2A26,#12473F 55%,#16665B)!important;background-size:200% 200%!important;animation:petroShift 16s ease infinite;border:2px solid var(--gold)!important;position:relative;overflow:hidden;box-shadow:0 22px 50px rgba(8,24,28,.40),0 0 30px rgba(197,160,89,.22)!important}
.cmp.win::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--gg);box-shadow:0 0 18px rgba(197,160,89,.6);z-index:2}
.cmp.win h3{color:var(--gold2)!important;font-size:1.3rem!important}
.cmp.lose{border:1.5px solid rgba(16,52,60,.22)!important}

/* faixa branca do carrossel — bordas com mais contraste */
.adms{background:rgba(255,255,255,.6)!important;-webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);border-top:1px solid rgba(16,52,60,.18);border-bottom:1.5px solid rgba(16,52,60,.30)!important}
.lp{border:none!important;background:transparent!important;box-shadow:none!important}

/* SIMULADOR: branco sólido — SEM glass, borda com contraste */
.form-card{background:#fff!important;-webkit-backdrop-filter:none!important;backdrop-filter:none!important;border:1.5px solid rgba(16,52,60,.20)!important;box-shadow:0 30px 70px rgba(0,0,0,.32)!important}
.form-card .f input,.form-card .f select{border:1.5px solid rgba(16,52,60,.22)!important}

/* textos dourados 'em' com gradiente animado */
.sec-head h2 em,.ctaband h2 em,.about h2 em{background:linear-gradient(100deg,#E8CC8B,#C5A059 50%,#8FD9CC 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:hueShift 6s ease-in-out infinite}

/* faixa de certificações no hero */
.hero-certs{margin-top:24px;padding-top:20px;border-top:1px solid rgba(232,204,139,.25);text-align:right}
.hero-certs .cl{color:#9fb6b2;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;margin-bottom:13px}
.hero-certs .row{display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:flex-end}
.hero-certs img{height:68px;width:auto;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.32))}
@media(max-width:520px){.hero-certs img{height:52px}}
.hero-certs .disc{color:#7c918e;font-size:.7rem;line-height:1.5;margin:14px 0 0 auto;max-width:560px}
@media(max-width:900px){.hero-certs{text-align:center}.hero-certs .row{justify-content:center}.hero-certs .disc{margin:14px auto 0}}
/* selos do hero permanecem vidro escuro c/ borda dourada */
.seal{background:rgba(255,255,255,.08)!important;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1.5px solid rgba(232,204,139,.5)!important}

/* marca d'água repetida + mesh de luz (igual ao resto do site) */
body{position:relative}
body::before{content:"";position:fixed;inset:0;z-index:-3;pointer-events:none;background:
  radial-gradient(42% 36% at 10% 6%,rgba(34,118,106,.10),transparent 70%),
  radial-gradient(38% 32% at 90% 14%,rgba(197,160,89,.08),transparent 70%),
  radial-gradient(46% 40% at 82% 90%,rgba(34,118,106,.08),transparent 70%)}
body::after{content:"";position:fixed;inset:-12%;z-index:-2;pointer-events:none;background-image:url('https://cdn.jsdelivr.net/gh/aaigabrielabreu-sudo/agionconsorcio@main/frontend/public/images/logo-agion.png');background-repeat:repeat;background-size:clamp(180px,16vw,260px);filter:blur(.6px);opacity:.05;transform:rotate(-10deg)}

/* WhatsApp flutuante */
.wfloat{position:fixed;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;background:#25D366;display:grid;place-items:center;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:50}
.wfloat svg{width:32px;height:32px;fill:#fff}
@media(max-width:560px){.wfloat{width:54px;height:54px;right:16px;bottom:16px}}
</style>
<style>
.hero{min-height:100svh;display:flex;align-items:center;justify-content:center}
.hero .wrap{width:100%;max-width:520px;padding:18px;margin:0 auto}
.form-card{width:100%;margin:0 auto}
@media(max-width:520px){.hero{min-height:auto;padding:10px 0}.hero .wrap{padding:14px}}
</style>
</head>
<body>
<header class="hero"><div class="wrap">
<div class="form-card">
    <p class="fh1">Simule o seu consórcio.<br><em>O momento é agora!</em></p>
    <p class="sub">Aproveite as melhores condições e comece a realizar seu sonho — sem juros e com planejamento.</p>
    <div class="f"><label>Que tipo de produto você busca?</label>
      <select><option>Selecione...</option><option>Imóvel novo</option><option>Imóvel usado</option><option>Terreno</option><option>Terreno e construção</option><option>Reforma</option><option>Quitação de financiamento</option><option>Investimento</option><option>Automóvel</option></select></div>
    <div class="f"><label>Valor do crédito</label><input placeholder="Ex: R$ 300.000,00"></div>
    <p class="minv">Valor mínimo: R$ 100.000,00</p>
    <div class="f"><label>Nome</label><input placeholder="Seu nome completo"></div>
    <div class="f"><label>E-mail</label><input placeholder="seu@email.com"></div>
    <div class="f"><label>Telefone (com DDD)</label><input placeholder="(51) 9 9999-9999"></div>
    <button class="btn btn-gold" id="simBtn">Simular agora</button>
  </div>
</div></header>
<script>
(function(){
  var _qs=new URLSearchParams(location.search);
  var ORIGEM=((_qs.get('origem')||'Site').trim())||'Site';
  var CAMPQ=(_qs.get('campanha')||'').trim();
  var CAPT="https://sfekirqoflozylghwlbe.supabase.co/functions/v1/captacao?key=agion&origem="+encodeURIComponent(ORIGEM);
  var ROBO="5551982034245";
  var card=document.querySelector('.form-card');
  if(!card) return;
  var ins=card.querySelectorAll('input');
  var valEl=ins[0];
  function fmt(v){v=(v||'').replace(/\D/g,'');if(!v)return '';return (parseInt(v,10)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
  if(valEl) valEl.addEventListener('input',function(){valEl.value=fmt(valEl.value);});
  function go(){
    var prod=(card.querySelector('select')||{}).value||'';
    var valv=(valEl&&valEl.value||'').trim();
    var nome=(ins[1]&&ins[1].value||'').trim();
    var email=(ins[2]&&ins[2].value||'').trim();
    var tel=(ins[3]&&ins[3].value||'').trim();
    var contato=(tel||'')+' \u00b7 '+(email||'');
    var valor=(valv||'').replace(/\D/g,'');
    try{
      fetch(CAPT,{method:'POST',keepalive:true,headers:{'Content-Type':'application/json'},
        body:JSON.stringify({nome:(nome||'').trim(),contato:contato,tipo:'Cons\u00f3rcio',origem:ORIGEM,campanha:(CAMPQ||('Simulador do site \u2014 '+(prod||''))),valor:valor})}).catch(function(){});
    }catch(e){}
    var msg='Ol\u00e1! Quero simular meu cons\u00f3rcio na Agion.';
    if(nome) msg+=' Nome: '+nome+'.';
    if(prod && prod!=='Selecione...') msg+=' Produto: '+prod+'.';
    if(valv) msg+=' Cr\u00e9dito: '+valv+'.';
    if(email) msg+=' E-mail: '+email+'.';
    if(tel) msg+=' Telefone: '+tel+'.';
    window.open('https://wa.me/'+ROBO+'?text='+encodeURIComponent(msg),'_blank');
  }
  var btn=document.getElementById('simBtn');
  if(btn) btn.addEventListener('click',function(e){e.preventDefault();go();});
})();
</script>
</body>
</html>
