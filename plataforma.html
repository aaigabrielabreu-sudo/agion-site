const LEAD_CATS=[
 {k:'imovel',lb:'Imóvel',ic:'🏠',cor:'#7FB2A6',re:/(im[oó]ve|casa\b|apart|ap[eê]\b|terreno|reforma|obra\b|constru|loja\b|sala comercial|galp|ch[aá]cara|s[ií]tio|quita[cç][aã]o)/},
 {k:'auto',lb:'Auto',ic:'🚗',cor:'#8FB7D9',re:/(carro|autom[oó]|ve[ií]culo|\bmoto\b|caminh[aã]o|pickup|\bsuv\b|\bauto\b|caminhonete)/},
 {k:'estetica',lb:'Estética',ic:'✨',cor:'#D9A8C5',re:/(cirurg|\blipo|silicone|est[eé]tic|pl[aá]stica|rinoplast|abdominoplast|pr[oó]tese|harmoniz|mamoplast|bariátr|bariatr|implante)/},
 {k:'solar',lb:'Energia solar',ic:'☀️',cor:'#E5C97B',re:/(solar|placa.*energia|energia.*solar)/},
 {k:'nautica',lb:'Náutico',ic:'🚤',cor:'#9BC0E0',re:/(barco|lancha|jet ?ski|embarca)/}
];
function leadCategoria(l){ const s=((l.obs||'')+' '+(l.nome||'')+' '+(l.tipo||'')).toLowerCase(); for(const c of LEAD_CATS){ if(c.re.test(s)) return c; } return {k:'outros',lb:'Outros',ic:'📄',cor:'#A8B8B3'}; }
const LEAD_ORIGENS=[
 {k:'formulario',lb:'Formulário / Simulação',ic:'📝',cor:'#8FB7D9'},
 {k:'whatsapp',lb:'WhatsApp direto',ic:'💬',cor:'#7FB2A6'},
 {k:'retencao',lb:'Reengajamento / Retenção',ic:'🔁',cor:'#E5C97B'},
 {k:'captacao',lb:'Captação (Google/Meta)',ic:'📣',cor:'#D9A8C5'}
];
function leadOrigem(l){ const s=((l.obs||'')+' '+(l.tipo||'')).toLowerCase(); const t=(l.tipo||'');
 if(/reten/.test(s)) return LEAD_ORIGENS[2];
 if(/valor:|cartas:|contato:/.test(s)) return LEAD_ORIGENS[0];
 if(/especialista/.test(s)||/^whats/.test(t)) return LEAD_ORIGENS[1];
 if(t==='Consórcio'||/n[aã]o distribu/.test(s)) return LEAD_ORIGENS[3];
 return {k:'outro',lb:'Outra origem',ic:'📄',cor:'#A8B8B3'}; }
function crmLeadsFiltrados(arr){ let r=arr; if(view.crmCat&&view.crmCat!=='todas') r=r.filter(l=>leadCategoria(l).k===view.crmCat); if(view.crmOrigem&&view.crmOrigem!=='todas') r=r.filter(l=>leadOrigem(l).k===view.crmOrigem); return r; }
function crmSortLeads(a){ const m=view.crmSort||''; const b=a.slice(); if(m==='valor_desc')b.sort((x,y)=>(+y.valor||0)-(+x.valor||0)); else if(m==='valor_asc')b.sort((x,y)=>(+x.valor||0)-(+y.valor||0)); else if(m==='novo')b.sort((x,y)=>(y.criadoEm||0)-(x.criadoEm||0)); else if(m==='antigo')b.sort((x,y)=>(x.criadoEm||0)-(y.criadoEm||0)); return b; }
function crmSetCat(v){view.crmCat=v;render();}
function crmSetOrigem(v){view.crmOrigem=v;render();}
function crmSetSort(v){view.crmSort=v;render();}
function fmtDataLead(ts){ if(!ts)return '—'; const d=new Date(ts); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2); }
function diasLead(ts){ if(!ts)return ''; const d=Math.floor((Date.now()-ts)/86400000); return d<=0?'hoje':(d===1?'há 1 dia':'há '+d+' dias'); }

function leadPrefContato(l){ const s=(l.obs||'').toLowerCase(); const out=[];
 const hm=s.match(/(?:\b[aà]s|depois das|antes das|hor[aá]rio de?|liga(?:r)? (?:l[aá] )?pelas)\s*(\d{1,2})(?::(\d{2})|h)?/);
 if(hm){ out.push('🕐 '+hm[1]+(hm[2]?':'+hm[2]:'h')); }
 else if(/manh[ãa]/.test(s)) out.push('🕐 manhã');
 else if(/\btarde\b/.test(s)) out.push('🕐 tarde');
 else if(/\bnoite\b/.test(s)) out.push('🕐 noite');
 else if(/hor[aá]rio comercial/.test(s)) out.push('🕐 h. comercial');
 if(/whats/.test(s)) out.push('💬 prefere WhatsApp');
 else if(/liga[rç]|telefone|me ligue|chamada|ligac[aã]o/.test(s)) out.push('📞 prefere ligação');
 return out.join(' · ');
}

function leadCard(l,i){
  const last=CRM_STAGES.length-1;
  return `<div class="lead" draggable="true" ondragstart="dragStart(event,'${l.id}')" ondragend="dragEnd(event)"><span class="ttype tt-${l.tipo}">${l.tipo}</span> <span class="ttype" style="background:${leadCategoria(l).cor}26;border:1px solid ${leadCategoria(l).cor}66;color:${leadCategoria(l).cor}">${leadCategoria(l).ic} ${leadCategoria(l).lb}</span> <span class="ttype" style="background:${leadOrigem(l).cor}26;border:1px solid ${leadOrigem(l).cor}66;color:${leadOrigem(l).cor}">${leadOrigem(l).ic} ${leadOrigem(l).lb}</span> <div class="nm">${esc(l.nome)}</div> <div class="ct">${esc(l.contato||'')}</div> <div class="note" style="margin-top:4px;color:var(--soft)">📅 ${fmtDataLead(l.criadoEm)} · ${diasLead(l.criadoEm)}</div> ${leadPrefContato(l)?`<div class="note" style="margin-top:3px;color:var(--gold,#C5A059)">${leadPrefContato(l)}</div>`:''} ${l.valor?`<div class="vl">${BRL(l.valor)}</div>`:''}
    ${l.obs?`<div class="note" style="margin-top:6px">${esc(l.obs)}</div>`:''}
    ${(l.atividades&&l.atividades.length)?`<div class="note" style="margin-top:6px;color:var(--soft)"> ${esc(l.atividades[l.atividades.length-1].texto)} · ${timeAgo(l.atividades[l.atividades.length-1].quando)}</div>`:''}
    <div class="note" style="margin-top:6px;color:var(--soft)">${l.ownerId?''+esc(user(l.ownerId).nome.split(' ')[0]):'⚠️ não distribuído'}</div> ${(isMaster()||isLider())?`<select onchange="crmAssign('${l.id}',this.value)" style="margin-top:6px;font-size:.74rem;padding:6px 8px"><option value="">— distribuir para —</option>${(db.accounts||[]).filter(a=>a.real&&a.role==='especialista'&&(isMaster()||a.leaderId===meId())).map(a=>`<option value="${a.id}" ${l.ownerId===a.id?'selected':''}>${esc(a.nome)}</option>`).join('')}</select>`:''}
    <div class="acts"> ${i>0?`<button onclick="crmMove('${l.id}',-1)" title="Voltar etapa">◀</button>`:''}
      ${i<last?`<button onclick="crmMove('${l.id}',1)" title="Avançar etapa">▶</button>`:''}
      <button onclick="crmNote('${l.id}')"> Nota</button> <button onclick="openLead('${l.id}')">✎ Editar</button> <button onclick="crmToClient('${l.id}')">→ Cliente</button> <button onclick="crmLose('${l.id}')">Perdeu</button> </div></div>`;
}
function crmMove(id,d){const l=(db.crm).find(x=>x.id===id);const ns=Math.max(0,Math.min(CRM_STAGES.length-1,l.stage+d));if(ns!==l.stage){l.stage=ns;l.atividades=l.atividades||[];l.atividades.push({texto:'Movido para "'+CRM_STAGES[ns]+'"',quando:Date.now(),autorId:session.userId});logEvt('lead_mover','lead','Moveu o lead "'+l.nome+'" para "'+CRM_STAGES[ns]+'"',{lead:l.nome,etapa:CRM_STAGES[ns]});}saveLeadCloud(l);save();renderCRM(document.getElementById('content'));}
let _dragId=null;
function dragStart(e,id){_dragId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragEnd(e){e.currentTarget.classList.remove('dragging');}
function kbOver(e){e.preventDefault();e.currentTarget.classList.add('dragover');}
function kbLeave(e){e.currentTarget.classList.remove('dragover');}
function kbDrop(e,stage){e.preventDefault();e.currentTarget.classList.remove('dragover');if(roGuard()){_dragId=null;return;}const l=db.crm.find(x=>x.id===_dragId);_dragId=null;if(l&&l.stage!==stage){l.stage=stage;l.perdido=false;l.atividades=l.atividades||[];l.atividades.push({texto:'Movido para "'+CRM_STAGES[stage]+'"',quando:Date.now(),autorId:session.userId});logEvt('lead_mover','lead','Moveu o lead "'+l.nome+'" para "'+CRM_STAGES[stage]+'"',{lead:l.nome,etapa:CRM_STAGES[stage]});saveLeadCloud(l);save();renderCRM(document.getElementById('content'));flash('Movido para '+CRM_STAGES[stage]);}}
async function crmNote(id){if(roGuard())return;const t=await ask({title:'Nova atividade',msg:'Registre um contato, observação ou próximo passo:',input:true,ok:'Salvar'});if(!t||!t.trim())return;const l=db.crm.find(x=>x.id===id);l.atividades=l.atividades||[];l.atividades.push({texto:t.trim(),quando:Date.now(),autorId:session.userId});logEvt('lead_nota','lead','Registrou atividade no lead "'+l.nome+'"',{lead:l.nome,nota:t.trim()});saveLeadCloud(l);save();renderCRM(document.getElementById('content'));flash('Atividade registrada');}
function crmLose(id){if(roGuard())return;const l=(db.crm).find(x=>x.id===id);l.perdido=true;logEvt('lead_perdido','lead','Marcou o lead "'+l.nome+'" como perdido',{lead:l.nome});saveLeadCloud(l);save();renderCRM(document.getElementById('content'));flash('Lead marcado como perdido');}
function crmRecuperar(id){const l=(db.crm).find(x=>x.id===id);l.perdido=false;save();renderCRM(document.getElementById('content'));flash('Lead reativado');}
async function crmDel(id){if(!(await ask({title:'Excluir lead?',ok:'Excluir'})))return;db.crm=db.crm.filter(x=>x.id!==id);save();renderCRM(document.getElementById('content'));}
function crmAssign(id,uid){if(roGuard())return;const l=db.crm.find(x=>x.id===id);l.ownerId=uid||null;l.atividades=l.atividades||[];if(uid){l.atividades.push({texto:'Distribuído para '+user(uid).nome,quando:Date.now(),autorId:session.userId});logEvt('lead_distribuir','lead','Distribuiu o lead "'+l.nome+'" para '+user(uid).nome,{lead:l.nome,para:user(uid).nome});}saveLeadCloud(l);save();renderCRM(document.getElementById('content'));flash(uid?'Lead distribuído para '+user(uid).nome.split(' ')[0]:'Distribuição removida');}
function initialsOf(nome){return (nome||'').split(' ').filter(Boolean).map(x=>x[0]).slice(0,2).join('').toUpperCase()||'CL';}
function createClientAccount(c){
  let email=(c.email||'').trim();
  if(!email) email=(c.nome.split(' ')[0]||'cliente').toLowerCase()+'@cliente.agion';
  const ex=accByEmail(email); if(ex) return ex;
  const a={id:'ac'+uid(),role:'cliente',nome:c.nome,email,senha:senhaGen(),clientId:c.id,ownerId:meId(),inicial:initialsOf(c.nome),cor:'#4Fa3a3',papel:'Cliente',ativo:true};
  db.accounts.push(a); save(); return a;
}
async function crmToClient(id){
  if(roGuard())return;
  const l=(db.crm).find(x=>x.id===id);
  if(!(await ask({title:'Converter em cliente?',msg:`Cria a ficha de "${l.nome}", envia o convite de acesso por e-mail e abre o planejamento.`,ok:'Converter'})))return;
  let email=l.contato&&l.contato.includes('@')?l.contato.trim():'';
  if(!email){ email=await ask({title:'E-mail do cliente',msg:'Informe o e-mail para enviar o convite de acesso:',input:true,ok:'Criar e convidar'}); if(!email||!email.trim())return; email=email.trim(); }
  flash('Criando cliente…');
  try{ await criarConta(l.nome,email,'cliente'); }
  catch(e){ await ask({title:'Não foi possível criar',msg:String(e.message||e),ok:'Ok'}); return; }
  l.stage=CRM_STAGES.length-1; l.perdido=false; if(!l.ownerId)l.ownerId=meId(); saveLeadCloud(l); save();
  await loadCloud();
  await ask({title:'Cliente criado',msg:'Convite enviado para '+email+'. O cliente define a própria senha e acessa o planejamento.',ok:'Ok'});
  flash('Cliente criado a partir do lead'); view._from='crm';
  const c=db.clients.find(x=>(x.email||'').toLowerCase()===email.toLowerCase());
  if(c&&c.plans&&c.plans[0]) openEditor(c.id,c.plans[0].id,false);
}
function openLead(id){
  const l=id?(db.crm).find(x=>x.id===id):null;
  document.getElementById('leadTitle').textContent=l?'Editar lead':'Novo lead';
  document.getElementById('le_id').value=l?l.id:'';
  document.getElementById('le_nome').value=l?l.nome:'';
  document.getElementById('le_contato').value=l?(l.contato||''):'';
  document.getElementById('le_tipo').value=l?l.tipo:'Consórcio';
  document.getElementById('le_valor').value=l?(l.valor||0):0;
  document.getElementById('le_obs').value=l?(l.obs||''):'';
  document.getElementById('leadModal').classList.remove('hidden');
}
function closeLead(){document.getElementById('leadModal').classList.add('hidden');}
function saveLead(){
  const id=document.getElementById('le_id').value;
  const data={nome:document.getElementById('le_nome').value.trim(),contato:document.getElementById('le_contato').value.trim(),
    tipo:document.getElementById('le_tipo').value,valor:parseFloat(document.getElementById('le_valor').value)||0,obs:document.getElementById('le_obs').value.trim()};
  if(!data.nome){flash('Informe o nome');return;}
  let _lead;
  if(id){_lead=(db.crm).find(x=>x.id===id);Object.assign(_lead,data);logEvt('lead_editar','lead','Editou o lead "'+data.nome+'"',{lead:data.nome});}
  else{_lead={id:uuid(),stage:0,perdido:false,criadoEm:Date.now(),ownerId:meId(),...data};db.crm.push(_lead);logEvt('lead_criar','lead','Criou o lead "'+data.nome+'"',{lead:data.nome,tipo:data.tipo});}
  saveLeadCloud(_lead);save();closeLead();renderCRM(document.getElementById('content'));flash('Lead salvo');
}

    +fld('Imagem da campanha (opcional)','<input id="tplImg" type="file" accept="image/png,image/jpeg" style="'+bx+'">','PNG ou JPG. Vira o cabeçalho do template.')
    +fld('Texto da mensagem','<textarea id="tplBody" rows="5" placeholder="Ex: Olá {{1}}! Aproveite nossa campanha de consórcio de imóvel com condições especiais. Fale com a gente!" style="'+bx+';resize:vertical"></textarea>','Use {{1}}, {{2}}… para as partes que mudam (ex.: {{1}} = nome do cliente).')

    +'<p class="note" style="font-size:.75rem;margin:0 0 14px">Depois de enviar, a Meta analisa (geralmente até ~1 dia). Quando aprovar, o template fica disponível para envio na aba Conversas.</p>'
    +'<button class="btn btn-gold" style="width:100%" onclick="tplSubmit()">Enviar para aprovação</button></div></div>';

async function tplSubmit(){
  if(roGuard())return;
  const name=(document.getElementById('tplName').value||'').trim().toLowerCase().replace(/[^a-z0-9_]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  const category=document.getElementById('tplCat').value;
  const body=(document.getElementById('tplBody').value||'').trim();
  const footer=(document.getElementById('tplFoot').value||'').trim();
  const fileEl=document.getElementById('tplImg'); const file=fileEl&&fileEl.files&&fileEl.files[0];
  if(!name){ flash('Dê um nome ao template'); return; }
  if(!body){ flash('Escreva o texto da mensagem'); return; }
  let image_b64='', image_type='';
  if(file){
    if(file.size>5*1024*1024){ flash('Imagem muito grande (máx 5MB)'); return; }
    image_type=file.type||'image/png';
    image_b64=await new Promise(function(res){ const rd=new FileReader(); rd.onload=function(){ res(String(rd.result||'').split(',')[1]||''); }; rd.onerror=function(){res('');}; rd.readAsDataURL(file); });
  }
  flash('Enviando template para aprovação…');
  const payload={name:name,category:category,language:'pt_BR',body:body,footer:footer,header:(file?'IMAGE':'NONE'),image_b64:image_b64,image_type:image_type};
  let r; try{ r=await apiFetch('/api/create_template',{method:'POST',body:JSON.stringify(payload)}); }catch(e){ r={ok:false,data:{error:String(e)}}; }
  if(r&&r.ok&&r.data&&!r.data.error){
    logEvt&&logEvt('INSERT','app','Criou template "'+name+'" ('+category+') e enviou p/ aprovação',{template:name});
    const m=document.getElementById('tplModal'); if(m)m.remove();
    await ask({title:'Template enviado ✓',msg:'O template “'+name+'” foi enviado para a Meta. Assim que for aprovado, aparece como “Aprovado” e já pode ser usado nas Conversas.',ok:'Ok'});
    if(view.page==='marketing') renderMarketing(document.getElementById('content'));
  } else {
    const err=(r&&r.data&&r.data.error)||'não foi possível enviar agora (o recurso no robô pode ainda não estar publicado).';
    await ask({title:'Não foi possível enviar',msg:String(err),ok:'Ok'});
  }
}

/* ---- Ver / Editar template existente ---- */
function _tplComp(tpl,type){ return ((tpl.components||[]).filter(function(c){return (c.type||'').toUpperCase()===type;})[0])||null; }
async function tplOpen(name){
  if(!name)return;
  flash('Carregando template…');
  let r; try{ r=await apiFetch('/api/template_get',{method:'POST',body:JSON.stringify({name:name})}); }catch(e){ r={ok:false,data:{error:String(e)}}; }
  if(!(r&&r.ok&&r.data&&r.data.template)){ await ask({title:'Não deu para abrir',msg:(r&&r.data&&r.data.error)||'não foi possível carregar o conteúdo do template agora.',ok:'Ok'}); return; }
  tplViewEdit(r.data.template);
}
function tplViewEdit(tpl){
  const bx=_tplBx();
  const H=_tplComp(tpl,'HEADER'), B=_tplComp(tpl,'BODY'), F=_tplComp(tpl,'FOOTER'), BT=_tplComp(tpl,'BUTTONS');
  const hf=(H&&(H.format||'').toUpperCase())||'NONE';
  window._tplEdit={name:tpl.name,id:tpl.id||'',language:tpl.language||'pt_BR',header_format:hf,buttons:BT||null};
  const meta=TPL_META[tpl.name]; const lbl=meta?meta.label:tpl.name;
  const fld=(lb,inner,hint)=>'<label style="display:block;margin-bottom:12px"><span style="display:block;font-size:.78rem;color:var(--muted);margin-bottom:5px">'+lb+'</span>'+inner+(hint?'<span style="display:block;font-size:.72rem;color:var(--soft);margin-top:4px">'+hint+'</span>':'')+'</label>';
  let headerFld='';
  if(hf==='TEXT'){ headerFld=fld('Cabeçalho (texto)','<input id="teHdr" value="'+esc((H&&H.text)||'')+'" style="'+bx+'">'); }
  else if(hf==='IMAGE'||hf==='DOCUMENT'||hf==='VIDEO'){ headerFld=fld('Cabeçalho ('+hf.toLowerCase()+')','<input id="teImg" type="file" accept="'+(hf==='DOCUMENT'?'application/pdf':(hf==='VIDEO'?'video/*':'image/png,image/jpeg'))+'" style="'+bx+'">','Este template usa '+hf.toLowerCase()+'. Para salvar a edição, reanexe o arquivo.'); }
  const btnsInfo=BT?'<p class="note" style="font-size:.75rem;margin:2px 0 12px">Este template tem botões — eles serão mantidos como estão.</p>':'';
  if(hf!=='IMAGE'&&hf!=='DOCUMENT'&&hf!=='VIDEO'){ headerFld += fld('Imagem (PNG) de cabecalho - opcional','<input id="teImg" type="file" accept="image/png,image/jpeg"><p class="note" style="font-size:.72rem;margin:4px 0 0">Envie um PNG/JPG para virar a imagem do topo (ex: campanha/oferta). Ao salvar, o template passa a ter imagem.</p>'); }
  const editable=(tpl.status||'').toUpperCase()!=='PENDING';
  const html='<div id="tplModal" style="position:fixed;inset:0;z-index:240;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)this.remove()"><div style="background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:22px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><h2 style="margin:0;font-size:1.05rem">'+esc(lbl)+'</h2><button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'tplModal\').remove()">Fechar</button></div>'
    +'<div style="margin-bottom:14px">'+tplStatusBadge(tpl.status)+' <span class="note">'+esc(tpl.name)+' · '+esc(tpl.language||'')+'</span></div>'
    +headerFld
    +fld('Categoria','<select id="teCat" style="'+bx+'"><option value="MARKETING"'+(tpl.category==='MARKETING'?' selected':'')+'>Marketing (campanha/oferta)</option><option value="UTILITY"'+(tpl.category==='UTILITY'?' selected':'')+'>Utilidade (aviso/serviço)</option></select>')
    +fld('Texto da mensagem','<textarea id="teBody" rows="6" style="'+bx+';resize:vertical">'+esc((B&&B.text)||'')+'</textarea>','Use {{1}}, {{2}}… para as partes que mudam.')
    +fld('Rodapé (opcional)','<input id="teFoot" value="'+esc((F&&F.text)||'')+'" style="'+bx+'">')
    +btnsInfo
    +'<p class="note" style="font-size:.75rem;margin:0 0 14px">⚠️ Salvar a edição envia o template para nova análise da Meta (fica algumas horas indisponível para envio).</p>'
    +(editable?'<button class="btn btn-gold" style="width:100%" onclick="tplEditSubmit()">Salvar alterações</button>':'<p class="note">Template em análise — aguarde a Meta concluir antes de editar novamente.</p>')
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}
async function tplEditSubmit(){
  if(roGuard())return;
  const S=window._tplEdit||{};
  const category=(document.getElementById('teCat')||{}).value||'';
  const body=((document.getElementById('teBody')||{}).value||'').trim();
  const footer=((document.getElementById('teFoot')||{}).value||'').trim();
  if(!body){ flash('O texto não pode ficar vazio'); return; }
  let header_format=S.header_format||'NONE', header_text='', image_b64='', image_type='';
  var _feX=document.getElementById('teImg'); if(_feX&&_feX.files&&_feX.files[0]&&header_format!=='IMAGE'&&header_format!=='DOCUMENT'&&header_format!=='VIDEO'){ header_format='IMAGE'; }
  if(header_format==='TEXT'){ header_text=((document.getElementById('teHdr')||{}).value||'').trim(); }
  else if(header_format==='IMAGE'||header_format==='DOCUMENT'||header_format==='VIDEO'){
    const fe=document.getElementById('teImg'); const file=fe&&fe.files&&fe.files[0];
    if(!file){ await ask({title:'Falta o arquivo',msg:'Este template tem '+header_format.toLowerCase()+' no cabeçalho. Reanexe o arquivo para poder salvar a edição.',ok:'Ok'}); return; }
    if(file.size>5*1024*1024){ flash('Arquivo muito grande (máx 5MB)'); return; }
    image_type=file.type||(header_format==='DOCUMENT'?'application/pdf':'image/png');
    image_b64=await new Promise(function(res){ const rd=new FileReader(); rd.onload=function(){res(String(rd.result||'').split(',')[1]||'');}; rd.onerror=function(){res('');}; rd.readAsDataURL(file); });
    if(!image_b64){ flash('Não consegui ler o arquivo'); return; }
  }
  const okc=await ask({title:'Enviar edição?',msg:'O template “'+S.name+'” vai para nova análise da Meta. Confirmar?',ok:'Enviar'});
  if(!okc)return;
  flash('Enviando edição…');
  const payload={name:S.name,id:S.id,category:category,language:S.language,body:body,footer:footer,header_format:header_format,header_text:header_text,image_b64:image_b64,image_type:image_type,buttons:S.buttons||null};
  let r; try{ r=await apiFetch('/api/edit_template',{method:'POST',body:JSON.stringify(payload)}); }catch(e){ r={ok:false,data:{error:String(e)}}; }
  if(r&&r.ok&&r.data&&!r.data.error){
    logEvt&&logEvt('UPDATE','app','Editou o template "'+S.name+'" (enviado p/ nova análise)',{template:S.name});
    const m=document.getElementById('tplModal'); if(m)m.remove();
    await ask({title:'Edição enviada ✓',msg:'As alterações foram enviadas. A Meta vai reanalisar; quando aprovar, o novo conteúdo passa a valer.',ok:'Ok'});
    if(view.page==='marketing') renderMarketing(document.getElementById('content'));
  } else {
    await ask({title:'Não foi possível salvar',msg:String((r&&r.data&&r.data.error)||'erro ao editar agora.'),ok:'Ok'});
  }
}

async function cartaEdit(id){
  if(roGuard())return;
  const editing=!!id;
  const cur=(_cartasList||[]).find(x=>x.id===id)||{};
  cartasClose();
  _cartaNextIdx=1;
  const blocks=_cartaBlockHtml(0, editing?cur:{}, false);
  const addBtn=editing?'':`<button class="btn btn-ghost btn-sm" style="width:100%;margin-bottom:14px" onclick="cartaAddBlock()">+ Adicionar outra carta</button>`;
  const html=`<div id="cartasModal" style="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)cartasClose()"><div style="background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:500px;width:100%;max-height:90vh;overflow:auto;padding:22px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="margin:0;font-size:1.05rem">${editing?'Editar carta':'Nova(s) carta(s)'}</h2><button class="btn btn-ghost btn-sm" onclick="openCartas(_cartasCid)">Voltar</button></div><div id="cartaBlocks">${blocks}</div>${addBtn}<button class="btn btn-gold" style="width:100%" onclick="cartaSave('${id||''}')">${editing?'Salvar carta':'Salvar cartas'}</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  setTimeout(()=>{const el=document.getElementById(editing?'kAdm_0':'kGru_0');if(el)el.focus();},60);
}
function cartaAddBlock(){
  const c=document.getElementById('cartaBlocks'); if(!c)return;
  const idx=_cartaNextIdx++;
  c.insertAdjacentHTML('beforeend', _cartaBlockHtml(idx,{},true));
  const el=document.getElementById('kGru_'+idx); if(el){el.focus(); el.scrollIntoView({block:'center',behavior:'smooth'});}
}
function cartaRemoveBlock(idx){
  const b=document.querySelector('.cartablk[data-idx="'+idx+'"]'); if(b)b.remove();
}
async function cartaSave(id){
  if(roGuard())return;
  const blocks=[...document.querySelectorAll('.cartablk')];
  const recs=[];
  for(const b of blocks){
    const idx=b.getAttribute('data-idx');
    const g=(document.getElementById('kGru_'+idx).value||'').trim();
    const c=(document.getElementById('kCot_'+idx).value||'').trim();
    const tit=(document.getElementById('kTit_'+idx).value||'').trim();
    if(!g&&!c&&(!tit||tit===_cartasNome)) continue;
    if(!g||!c){ flash&&flash('Informe grupo e cota em todas as cartas'); return; }
    const rawV=(''+(document.getElementById('kVal_'+idx).value||'')).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.');
    recs.push({cliente_id:_cartasCid,titular_nome:tit||_cartasNome,administradora:document.getElementById('kAdm_'+idx).value,grupo:g,cota:c,valor:rawV?(Number(rawV)||null):null,whatsapp:(document.getElementById('kWha_'+idx).value||'').replace(/\D/g,'')||null,is_familiar:document.getElementById('kFam_'+idx).checked});
  }
  if(!recs.length){ flash&&flash('Preencha ao menos uma carta (grupo e cota)'); return; }
  flash&&flash(recs.length>1?('Salvando '+recs.length+' cartas…'):'Salvando carta…');
  try{
    if(id){ await supa.from('cartas').update(Object.assign({},recs[0],{atualizado_em:new Date().toISOString()})).eq('id',id); logEvt&&logEvt('UPDATE','cartas','Editou carta '+recs[0].administradora+' '+recs[0].grupo+'/'+recs[0].cota+' de '+recs[0].titular_nome,{cliente_id:_cartasCid}); }
    else { await supa.from('cartas').insert(recs); logEvt&&logEvt('INSERT','cartas','Cadastrou '+recs.length+' carta(s) para '+_cartasNome,{cliente_id:_cartasCid,qtd:recs.length}); }
  }
  catch(e){ await ask({title:'Não foi possível salvar',msg:String(e.message||e),ok:'Ok'}); }
  openCartas(_cartasCid);
}
async function cartaDel(id){
  if(roGuard())return;
  if(!(await ask({title:'Excluir carta?',msg:'Tem certeza que deseja excluir esta carta?',ok:'Excluir'})))return;
  try{ await supa.from('cartas').delete().eq('id',id); logEvt&&logEvt('DELETE','cartas','Excluiu uma carta',{cliente_id:_cartasCid}); }catch(e){}
  openCartas(_cartasCid);
}

async function excluirConta(id){
  const a=acc(id); if(!a)return;
  if(!isMaster()){flash('Apenas o Master pode excluir contas.');return;}
  if(a.id===meId()){flash('Você não pode excluir a própria conta.');return;}
  if(!(await ask({title:'Excluir conta?',msg:'Remove DEFINITIVAMENTE a conta de '+a.nome+' ('+(a.email||'sem e-mail')+'): o acesso à plataforma, o planejamento e as cartas/consórcios vinculados. Esta ação não pode ser desfeita.',ok:'Excluir definitivamente'})))return;
  flash('Excluindo conta…');
  let okBackend=false;
  try{ const r=await supa.functions.invoke('excluir-conta',{body:{id:a.id,email:a.email||''}}); if(r&&!r.error&&!(r.data&&r.data.error))okBackend=true; }catch(e){}
  if(okBackend){
    db.accounts=(db.accounts||[]).filter(x=>x.id!==a.id);
    db.clients=(db.clients||[]).filter(c=>(c.email||'').toLowerCase()!==(a.email||'').toLowerCase());
    logEvt('DELETE','conta','Excluiu a conta de '+a.nome,{email:a.email});
    save(); renderContas(document.getElementById('content')); flash('Conta excluída'); return;
  }
  try{ a.ativo=false; if(isUuid(a.id)) await supa.from('profiles').update({ativo:false}).eq('id',a.id); }catch(e){}
  logEvt('conta_desativar','conta','Tentou excluir (backend pendente) — desativou '+a.nome,{email:a.email});
  save(); renderContas(document.getElementById('content'));
  await ask({title:'Exclusão pendente',msg:'A exclusão total (apagar o login) precisa da função de servidor, que ainda vou publicar. Por segurança, desativei o acesso desta conta agora — quando a função estiver no ar, a exclusão fica definitiva.',ok:'Ok'});
}
async function excluirClienteEmpresa(cid){
  if(!isMaster()){flash('Apenas o Master pode excluir clientes.');return;}
  const c=(db.clients||[]).find(x=>x.id===cid); if(!c)return;
  if(!(await ask({title:'Excluir cliente?',msg:'Remove DEFINITIVAMENTE o cliente '+c.nome+' e todos os dados dele (planos, cartas'+(c.email?' e o acesso à plataforma':'')+'). Esta ação não pode ser desfeita.',ok:'Excluir definitivamente'})))return;
  flash('Excluindo cliente…');
  const prof=c.email?(db.accounts||[]).find(a=>a.role==='cliente'&&(a.email||'').toLowerCase()===(c.email||'').toLowerCase()):null;
  if(prof){
    let ok=false;
    try{ const r=await supa.functions.invoke('excluir-conta',{body:{id:prof.id,email:prof.email||c.email||''}}); if(r&&!r.error&&!(r.data&&r.data.error))ok=true; }catch(e){}
    if(ok){ db.accounts=(db.accounts||[]).filter(a=>a.id!==prof.id); }
    else{ try{ prof.ativo=false; if(isUuid(prof.id)) await supa.from('profiles').update({ativo:false}).eq('id',prof.id); }catch(e){} flash('Login desativado; exclusão total do acesso ficou pendente do servidor.'); }
  }
  try{ if(isUuid(cid)){ try{await supa.from('cartas').delete().eq('cliente_id',cid);}catch(e){} try{await supa.from('planos').delete().eq('cliente_id',cid);}catch(e){} try{await supa.from('clientes').delete().eq('id',cid);}catch(e){} } }catch(e){}
  logEvt('DELETE','clientes','Excluiu o cliente '+c.nome,{cliente_id:cid});
  db.clients=(db.clients||[]).filter(x=>x.id!==cid);
  save(); if(view.page==='users'){renderClients(document.getElementById('content'));}else{render();} flash('Cliente excluído');
}

let _act=[]; const _aflt={actor:'',cat:'',per:'30'};
const ACT_VERB={INSERT:'criou',UPDATE:'atualizou',DELETE:'removeu',LOGIN:'entrou na plataforma',criar_conta:'criou uma conta',lead_criar:'criou um lead',lead_editar:'editou um lead',lead_mover:'moveu um lead',lead_distribuir:'distribuiu um lead',lead_perdido:'marcou um lead como perdido',lead_nota:'registrou atividade num lead',tarefa_criar:'criou uma tarefa',tarefa_concluir:'concluiu uma tarefa',tarefa_reabrir:'reabriu uma tarefa',reset_senha:'redefiniu uma senha',conta_ativar:'ativou uma conta',conta_desativar:'desativou uma conta'};
function actCat(ev){const a=ev.action;if(['lead_criar','lead_editar','lead_mover','lead_distribuir','lead_perdido','lead_nota'].indexOf(a)>=0)return'lead';if(['tarefa_criar','tarefa_concluir','tarefa_reabrir'].indexOf(a)>=0)return'tarefa';if(['criar_conta','reset_senha','conta_ativar','conta_desativar'].indexOf(a)>=0)return'conta';if(a==='LOGIN')return'login';if(ev.entity==='planos')return'plano';if(ev.entity==='clientes'||ev.entity==='cliente')return'cliente';return'outro';}

const CAT_LBL={lead:'Leads',tarefa:'Tarefas',conta:'Contas',login:'Logins',plano:'Planos',cliente:'Clientes',outro:'Outros'};
function actText(ev){const v=ACT_VERB[ev.action];if(['INSERT','UPDATE','DELETE'].indexOf(ev.action)>=0){const ent=ev.entity==='planos'?'um plano':'um cliente';let nm='';if(ev.cliente_id){const c=(db.clients||[]).find(x=>x.id===ev.cliente_id);if(c)nm=' — '+c.nome;}return v+' '+ent+nm;}return ev.descricao||(v||ev.action)+(ev.entity&&ev.entity!=='app'?' ('+ev.entity+')':'');}
function fmtDay(ts){const d=new Date(ts),h=new Date(),y=new Date(Date.now()-86400000);const sd=(a,b)=>a.toDateString()===b.toDateString();if(sd(d,h))return'Hoje';if(sd(d,y))return'Ontem';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});}

function exportLogCSV(){ const rows=_act||[]; if(!rows.length){flash&&flash('Nada para exportar');return;} const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"'; const head=['Data/Hora','Usuario','Papel','Categoria','Acao','Entidade','Descricao']; const body=rows.map(e=>[new Date(e.criado_em).toLocaleString('pt-BR'),(e.actor_nome||'Sistema'),(e.actor_role?(ROLE_LBL[e.actor_role]||e.actor_role):''),(CAT_LBL[actCat(e)]||actCat(e)),(e.action||''),(e.entity||''),actText(e)].map(q).join(',')); const csv='﻿'+[head.map(q).join(',')].concat(body).join('\r\n'); const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='agion-atividades-'+new Date().toISOString().slice(0,10)+'.csv'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100); }
function setAflt(k,v){ _aflt[k]=v; paintAtividades(document.getElementById('content')); }
function paintAtividades(C){
  const now=Date.now(); const perMs={'1':86400000,'7':7*86400000,'30':30*86400000,'all':Infinity}[_aflt.per];
  const actors=[...new Set(_act.map(e=>e.actor_nome||'Sistema'))].sort();
  let rows=_act.filter(e=>{
    if(_aflt.actor&&(e.actor_nome||'Sistema')!==_aflt.actor)return false;
    if(_aflt.cat&&actCat(e)!==_aflt.cat)return false;
    if(perMs!==Infinity&&(now-new Date(e.criado_em).getTime())>perMs)return false;
    return true;
  });
  const todayN=_act.filter(e=>(now-new Date(e.criado_em).getTime())<86400000).length;
  const opt=(v,l,sel)=>`<option value="${esc(v)}" ${sel===v?'selected':''}>${esc(l)}</option>`;
  const actorSel=`<select onchange="setAflt('actor',this.value)" style="font-size:.78rem;padding:7px 10px">${opt('','Todos os usuários',_aflt.actor)}${actors.map(a=>opt(a,a,_aflt.actor)).join('')}</select>`;
  const catSel=`<select onchange="setAflt('cat',this.value)" style="font-size:.78rem;padding:7px 10px">${opt('','Todas as ações',_aflt.cat)}${Object.keys(CAT_LBL).map(k=>opt(k,CAT_LBL[k],_aflt.cat)).join('')}</select>`;
  const perSel=`<select onchange="setAflt('per',this.value)" style="font-size:.78rem;padding:7px 10px">${opt('1','Últimas 24h',_aflt.per)}${opt('7','Últimos 7 dias',_aflt.per)}${opt('30','Últimos 30 dias',_aflt.per)}${opt('all','Tudo',_aflt.per)}</select>`;
  // agrupa por dia
  let html='', lastDay='';
  rows.forEach(e=>{
    const ts=new Date(e.criado_em).getTime(); const day=fmtDay(ts);
    if(day!==lastDay){ if(lastDay)html+='</div>'; html+=`<div class="panel"><h2 style="font-size:.92rem">${day}</h2>`; lastDay=day; }
    const cat=actCat(e); const who=e.actor_nome||'Sistema'; const role=e.actor_role?ROLE_LBL[e.actor_role]||e.actor_role:'';
    html+=`<div class="netrow"><span style="display:flex;align-items:center;gap:10px"><span style="width:9px;height:9px;border-radius:50%;background:${CAT_DOT[cat]};flex:0 0 auto"></span><span><b style="color:var(--head)">${esc(who)}</b>${role?` <span class="note">· ${esc(role)}</span>`:''}<br><span class="note">${esc(actText(e))}</span></span></span><span class="note" style="white-space:nowrap">${fmtHM(ts)}</span></div>`;
  });
  if(lastDay)html+='</div>';
  if(!rows.length)html='<div class="panel"><p class="note">Nenhuma atividade no período/filtro selecionado.</p></div>';
  C.innerHTML=`
   <div class="banner">Registro automático e à prova de adulteração: tudo que master, líderes, especialistas e clientes fazem fica gravado no servidor (Supabase). Só você (Master) vê esta aba.</div>
   <div class="kpis"><div class="kpi grad"><div class="lab">${ICN.check}Eventos (total)</div><b>${_act.length}</b></div><div class="kpi"><div class="lab">${ICN.check}Nas últimas 24h</div><b>${todayN}</b></div><div class="kpi"><div class="lab">${ICN.users}Usuários ativos</div><b>${actors.length}</b></div></div>
   ${actorCardsHtml()}
   <div class="panel"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">${actorSel}${catSel}${perSel}<span class="note" style="margin-left:auto">${rows.length} evento(s)</span></div></div>
   ${html}`;
}
function actSeenKey(pid){ return 'agion_actseen_'+meId()+'_'+pid; }
function actSeenTs(pid){ return +(localStorage.getItem(actSeenKey(pid))||0); }
function actMarkSeen(pid){ localStorage.setItem(actSeenKey(pid),String(Date.now())); }
function actorCardsHtml(){
  const now=Date.now(); const perMs={'1':86400000,'7':7*86400000,'30':30*86400000,'all':Infinity}[_aflt.per];
  const inPer=e=>perMs===Infinity||(now-new Date(e.criado_em).getTime())<=perMs;
  const ord={master:0,lider:1,especialista:2};
  const staff=(db.accounts||[]).filter(a=>a.real&&ord[a.role]!=null).sort((a,b)=>(ord[a.role]-ord[b.role])||(a.nome||'').localeCompare(b.nome||''));
  if(!staff.length) return '';
  const cards=staff.map(a=>{
    const evs=_act.filter(e=>e.actor_id===a.id&&inPer(e));
    const seen=actSeenTs(a.id);
    const unseen=evs.filter(e=>new Date(e.criado_em).getTime()>seen).length;
    const byCat={}; evs.forEach(e=>{const c=actCat(e);byCat[c]=(byCat[c]||0)+1;});
    const resumo=Object.keys(byCat).sort((x,y)=>byCat[y]-byCat[x]).slice(0,3).map(c=>byCat[c]+' '+(CAT_LBL[c]||c).toLowerCase()).join(' · ')||'sem atividades no período';
    const chip=a.role==='master'?' <span class="chip">MASTER</span>':a.role==='lider'?' <span class="chip">LÍDER</span>':'';
    return `<div class="actcard">${unseen?`<span class="actbadge">${unseen>99?'99+':unseen}</span>`:''}<div class="achead">${avatar(a.id,44)}<div><b style="color:var(--head)">${esc(a.nome)}</b>${chip}<div class="note" style="margin-top:3px">${esc(roleLabel(a.role,a.papel))}</div></div></div><div class="note acres">${esc(resumo)}</div><button class="btn btn-ghost btn-sm acbtn" onclick="verParticipante('${a.id}')">Ver mais</button></div>`;
  }).join('');
  return `<div class="panel"><h2 style="font-size:.95rem">${ICN.users} Participantes <span class="note" style="font-weight:400">(atividades novas desde a última vez que você abriu)</span></h2><div class="actgrid">${cards}</div></div>`;
}
function verParticipante(id){
  const a=(db.accounts||[]).find(x=>x.id===id)||{nome:'—',role:''};
  const now=Date.now(); const perMs={'1':86400000,'7':7*86400000,'30':30*86400000,'all':Infinity}[_aflt.per];
  const inPer=e=>perMs===Infinity||(now-new Date(e.criado_em).getTime())<=perMs;
  const all=_act.filter(e=>e.actor_id===id&&inPer(e));
  const byCat={}; all.forEach(e=>{const c=actCat(e);byCat[c]=(byCat[c]||0)+1;});
  const chips=Object.keys(byCat).sort((x,y)=>byCat[y]-byCat[x]).map(c=>`<span class="chip" style="margin:0 6px 6px 0">${CAT_LBL[c]||c}: ${byCat[c]}</span>`).join('')||'<span class="note">Sem atividades no período.</span>';
  const list=all.slice(0,40).map(e=>`<div class="netrow"><span style="display:flex;align-items:center;gap:9px"><span style="width:8px;height:8px;border-radius:50%;background:${CAT_DOT[actCat(e)]};flex:0 0 auto"></span><span class="note">${esc(actText(e))}</span></span><span class="note" style="white-space:nowrap">${esc(fmtWhen(new Date(e.criado_em).getTime()))}</span></div>`).join('')||'<p class="note">Nada no período.</p>';
  const verComoBtn=(isMaster()&&(a.role==='especialista'||a.role==='lider'))?`<button class="btn btn-gold btn-sm" style="margin-bottom:14px" onclick="document.getElementById('vpModal').remove();verComo('${id}')">👁 Ver como ${esc((a.nome||'').split(' ')[0])} (somente leitura)</button>`:'';
  const html=`<div id="vpModal" style="position:fixed;inset:0;z-index:240;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)this.remove()"><div style="background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:520px;width:100%;max-height:88vh;overflow:auto;padding:20px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="display:flex;align-items:center;gap:11px">${avatar(id,44)}<div><h2 style="margin:0;font-size:1.05rem">${esc(a.nome)}</h2><div class="note">${esc(roleLabel(a.role,a.papel))} · ${all.length} atividade(s)</div></div></div><button class="btn btn-ghost btn-sm" onclick="document.getElementById('vpModal').remove()">Fechar</button></div><div style="margin-bottom:14px">${chips}</div>${verComoBtn}<h4 style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold2);margin-bottom:6px">Atividades recentes</h4>${list}</div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  actMarkSeen(id);
  if(view.page==='atividades'){ try{ paintAtividades(document.getElementById('content')); }catch(e){} }
}
async function openAccount(){
  if(!(isMaster()||isLider())){flash('Apenas Master e Líder criam contas.');return;}
  const opts=isMaster()?'líder, especialista ou cliente':'especialista ou cliente';
  const tipo=await ask({title:'Nova conta',msg:'Qual o tipo? Digite: '+opts,input:true,value:'especialista',ok:'Próximo'});
  if(!tipo)return; const tl=tipo.toLowerCase();
  let role=tl.indexOf('líd')>=0||tl.indexOf('lid')>=0?'lider':(tl.indexOf('cli')>=0?'cliente':'especialista');
  if(role==='lider'&&!isMaster()){flash('Apenas o Master cria líderes.');return;}
  const nome=await ask({title:'Nome',msg:'Nome completo:',input:true,ok:'Próximo'}); if(!nome||!nome.trim())return;
  const email=await ask({title:'E-mail',msg:'E-mail de acesso (enviaremos um convite):',input:true,ok:'Criar e convidar'}); if(!email||!email.trim())return;
  flash('Criando conta…');
  try{ await criarConta(nome.trim(),email.trim(),role); }
  catch(e){ await ask({title:'Não foi possível criar',msg:String(e.message||e),ok:'Ok'}); return; }
  await loadCloud();
  await ask({title:'Conta criada',msg:`Convite enviado para ${email.trim()}. ${ROLE_LBL[role]} define a própria senha pelo e-mail.`,ok:'Ok'});
  renderContas(document.getElementById('content'));
}
async function resetAccount(id){const a=acc(id);if(!(await ask({title:'Redefinir senha?',msg:`Enviar e-mail de redefinição de senha para ${a.nome} (${a.email})?`,ok:'Enviar'})))return; try{ if(supa&&a.email) await supa.auth.resetPasswordForEmail(a.email,{redirectTo:location.origin+location.pathname}); }catch(e){} logEvt('reset_senha','conta','Enviou redefinição de senha para '+a.nome,{email:a.email}); await ask({title:'E-mail enviado',msg:`Enviamos o link de redefinição de senha para ${a.email}.`,ok:'Ok'});}
async function toggleAccount(id){const a=acc(id);const nv=a.ativo===false?true:false;a.ativo=nv;if(supa&&isUuid(id)){try{await supa.from('profiles').update({ativo:nv}).eq('id',id);}catch(e){}}logEvt(nv?'conta_ativar':'conta_desativar','conta',(nv?'Ativou':'Desativou')+' a conta de '+a.nome,{email:a.email});save();renderContas(document.getElementById('content'));flash(nv?'Conta ativada':'Conta desativada — o usuário não consegue mais entrar');}
async function criarConta(nome,email,role){
  if(!supa) throw new Error('Serviço indisponível.');
  const {data,error}=await supa.functions.invoke('criar-conta',{body:{nome,email,role,redirectTo:location.origin+location.pathname+'?convite=1'}});
  if(error){ let m='Não foi possível criar a conta.'; try{const j=await error.context.json(); if(j&&j.error)m=j.error;}catch(e){} throw new Error(m); }
  if(data&&data.error) throw new Error(data.error);
  logEvt('criar_conta',role,'Criou conta de '+(ROLE_LBL[role]||role)+': '+nome,{email,role});
  return data;
}
function chooseModal(title,msg,optA,optB){
  return new Promise(res=>{
    const id='chooseMd';
    const html=`<div id="${id}" style="position:fixed;inset:0;z-index:240;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px"><div style="background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:440px;width:100%;padding:22px"><h2 style="margin:0 0 8px;font-size:1.08rem;color:var(--head)">${esc(title)}</h2><p class="note" style="margin:0 0 18px;white-space:pre-line">${esc(msg)}</p><div style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-gold" id="cmA" style="width:100%">${esc(optA)}</button><button class="btn btn-ghost" id="cmB" style="width:100%">${esc(optB)}</button><button class="btn btn-ghost btn-sm" id="cmX" style="width:100%;opacity:.7">Cancelar</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend',html);
    const el=document.getElementById(id); const done=v=>{el.remove();res(v)};
    document.getElementById('cmA').onclick=()=>done('a');
    document.getElementById('cmB').onclick=()=>done('b');
    document.getElementById('cmX').onclick=()=>done(null);
    el.onclick=e=>{if(e.target===el)done(null)};
  });
}
async function newClient(){
  if(roGuard())return;
  const nome=await ask({title:'Novo cliente',msg:'Nome completo do cliente:',input:true,ok:'Próximo'});
  if(!nome||!nome.trim())return;
  const modo=await chooseModal('Habilitar plataforma?','Este cliente vai usar a plataforma de planejamento financeiro (login, projeção, metas, gastos)?\n\n• Sim — criamos o acesso e enviamos um convite por e-mail.\n• Não — cliente só de consórcio: fica na carteira para cadastrar cartas e emitir boleto, sem login.','Sim — habilitar plataforma','Não — só consórcio');
  if(!modo)return;
  if(modo==='b'){
    const tel=await ask({title:'WhatsApp do cliente',msg:'Número com DDD — usado para cadastrar a carta e emitir/enviar o boleto. Pode deixar em branco e preencher depois na carta.',input:true,ok:'Criar cliente'});
    if(tel===null)return;
    flash('Criando cliente…');
    const cid=uuid();
    try{ await supa.from('clientes').insert({id:cid,nome:nome.trim(),tel:((tel||'').replace(/\D/g,'')||null),owner_id:meId()}); }
    catch(e){ await ask({title:'Não foi possível criar',msg:String(e.message||e),ok:'Ok'}); return; }
    logEvt('INSERT','clientes','Criou cliente só de consórcio: '+nome.trim(),{tel:(tel||'')});
    await loadCloud(); flash('Cliente criado — cadastre a carta'); render();
    const c=db.clients.find(x=>x.id===cid)||db.clients.find(x=>x.nome===nome.trim());
    if(c) openCartas(c.id);
    return;
  }
  const email=await ask({title:'E-mail do cliente',msg:'Será o login de acesso do cliente (vamos enviar um convite):',input:true,ok:'Criar e convidar'});
  if(email===null||!email.trim())return;
  flash('Criando cliente…');
  try{ await criarConta(nome.trim(),email.trim(),'cliente'); }
  catch(e){ await ask({title:'Não foi possível criar',msg:String(e.message||e),ok:'Ok'}); return; }
  await loadCloud();
  let c=db.clients.find(x=>(x.email||'').toLowerCase()===email.trim().toLowerCase());
  if(!c){ try{ const cid=uuid(); await supa.from('clientes').insert({id:cid,nome:nome.trim(),email:email.trim(),owner_id:meId()}); await loadCloud(); c=db.clients.find(x=>x.id===cid)||db.clients.find(x=>(x.email||'').toLowerCase()===email.trim().toLowerCase()); }catch(e){} }
  await ask({title:'Cliente criado',msg:'Enviamos um convite por e-mail para '+email.trim()+'. O cliente define a própria senha e já acessa.',ok:'Ok'});
  flash('Cliente criado'); render();
  if(c&&c.plans&&c.plans[0]) openEditor(c.id,c.plans[0].id,false);
}

  const lista=p.consorcios||[];
  if(!lista.length) return `<p class="note">Nenhum consórcio adicionado ainda. Inclua uma carta acima para ver o impacto da contemplação no patrimônio.</p>`;
  const semC=planClone(p); semC.consorcios=[]; const Rsem=projetar(semC);
  const linhas=[6,12,24].map(m=>{const c=planClone(p);(c.consorcios||[]).forEach(x=>x.contemplaMes=m);const R=projetar(c);return{m,R};});

   </tbody></table></div> <p class="note" style="margin-top:10px">Quanto antes a contemplação (via lance), mais tempo a carta rende — por isso 6 meses supera 12 e 24. O especialista combina seus investimentos para potencializar o lance.</p>`;

function showSec(s){curSec=s;document.querySelectorAll('.plansec').forEach(el=>el.classList.toggle('on',el.dataset.sec===s));SECS.forEach(x=>{const b=document.getElementById('tabsec_'+x[0]);if(b)b.classList.toggle('on',x[0]===s);});drawSectionCharts(s);window.scrollTo(0,0);}
function drawSectionCharts(s){
  if(!edP||!edR)return; destroyCharts();
  const p=edP,R=edR,gold='#C5A059',teal='#8FD9CC',grid='rgba(143,217,204,.1)',tick='#9DB5B1';
  const ax=cb=>({maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+BRL(c.parsed.y)}}},scales:{x:{grid:{color:grid},ticks:{color:tick,maxTicksLimit:12}},y:{grid:{color:grid},ticks:{color:tick,callback:cb}}}});
  if(s==='resumo'){
    mkChart('gauge',{type:'doughnut',data:{datasets:[{data:[R.prob,100-R.prob],backgroundColor:[gold,'rgba(143,217,204,.12)'],borderWidth:0,circumference:360}]},options:{maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false},tooltip:{enabled:false}}},plugins:[{id:'txt',afterDraw(ch){const{ctx,chartArea}=ch;ctx.save();ctx.fillStyle='#C5A059';ctx.font='700 26px Lora';ctx.textAlign='center';ctx.fillText(R.prob+'%',(chartArea.left+chartArea.right)/2,(chartArea.top+chartArea.bottom)/2+9);ctx.restore()}}]});
  } else if(s==='patrimonio'){
    const cats={};(p.assets||[]).forEach(a=>cats[a.cat]=(cats[a.cat]||0)+(+a.valor||0));
    mkChart('chPie',{type:'doughnut',data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats),backgroundColor:['#C5A059','#8FD9CC','#E8CC8B','#4Fa3a3','#B0875F','#6E8B88'],borderWidth:0}]},options:{maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:tick,font:{size:11}}}}}});
  } else if(s==='fluxo'){
    mkChart('chFlow',{type:'bar',data:{labels:['Receita','Despesa','Sobra'],datasets:[{data:[R.renda,R.desp,Math.max(0,R.sobra)],backgroundColor:[teal,'#f87171',gold]}]},options:ax(v=>'R$ '+(v/1000).toFixed(0)+'k')});
  } else if(s==='projecao'){
    const splitIdx=R.idades.indexOf(p.apos);
    const markers=R.idades.map((a,i)=>{const g=(R.metas||[]).find(m=>(+m.idade||p.apos)===a);return g?R.serie[i]:null;});
    mkChart('chProj',{type:'line',data:{labels:R.idades,datasets:[
      {label:'Otimista',data:R.serieOtim,borderColor:'#34d399',borderWidth:1.6,pointRadius:0,tension:.25,borderDash:[5,4]},
      {label:'Pessimista',data:R.seriePess,borderColor:'#f87171',borderWidth:1.6,pointRadius:0,tension:.25,borderDash:[5,4]},
      {label:'Atual',data:R.serie,backgroundColor:'rgba(197,160,89,.12)',fill:true,tension:.25,pointRadius:0,borderWidth:2.6,borderColor:gold,
        segment:{borderColor:ctx=>ctx.p0DataIndex>=splitIdx?teal:gold}},
      {label:'Objetivos',data:markers,showLine:false,pointRadius:6,pointBackgroundColor:'#E8CC8B',pointBorderColor:'#0B2A26',pointBorderWidth:2}
    ]},options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false,axis:'x'},plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{title:its=>its&&its.length?('Aos '+its[0].label+' anos'):'',label:c=>c.dataset.label==='Objetivos'?null:c.dataset.label+': '+BRL(c.parsed.y)}}},scales:ax(v=>'R$ '+(v/1e6).toFixed(1)+'M').scales}});
  } else if(s==='consorcio'){
    const sem=planClone(p); sem.consorcios=[]; const Rs=projetar(sem);
    mkChart('chCons',{type:'line',data:{labels:R.idades,datasets:[
      {label:'Sem consórcio',data:Rs.serie,borderColor:'#6E8B88',borderWidth:1.8,pointRadius:0,tension:.25,borderDash:[5,4]},
      {label:'Com consórcio',data:R.serie,borderColor:gold,backgroundColor:'rgba(197,160,89,.12)',fill:true,borderWidth:2.6,pointRadius:0,tension:.25}
    ]},options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:tick}},tooltip:{callbacks:{label:c=>c.dataset.label+': R$ '+Math.round(c.parsed.y).toLocaleString('pt-BR')}}},scales:ax(v=>'R$ '+(v/1e6).toFixed(1)+'M').scales}});
  }
}

function collect(){ // lê o formulário para o objeto plano

  const sg=document.getElementById('f_seguro'); if(sg){p.seguro=p.seguro||{};p.seguro.atual=parseFloat(sg.value)||0;}
  document.querySelectorAll('[data-f]').forEach(el=>{const f=el.dataset.f,i=+el.dataset.i,k=el.dataset.k;if(!p[f]||!p[f][i])return;p[f][i][k]=(el.type==='number')?(parseFloat(el.value)||0):el.value;});

}

async function copyPlan(cid,pid){
  collect();const src=plan(cid,pid);
  const isCli=session.role==='cliente';
  const sug=(isCli?'Novo planejamento ':'Simulação ')+(client(cid).plans.filter(p=>!p.main).length+1);
  const nome=await ask({title:isCli?'Criar novo planejamento':'Nova simulação',msg:'Cria uma cópia editável. O Plano Principal é sempre preservado.',input:true,value:sug,ok:'Criar'});
  if(nome===null)return;
  const copy=JSON.parse(JSON.stringify(src));copy.id=uuid();copy.main=false;copy.parent=src.id;copy.titulo=(nome.trim()||sug);copy.criadoEm=Date.now();
  client(cid).plans.push(copy);save();flash(isCli?'Novo planejamento criado':'Cópia criada — principal preservado');
  if(isCli){view.planId=copy.id;view.readonly=false;render();}
  else openEditor(cid,copy.id,false);
}

  K.esps.slice().sort((a,b)=>b.atividades-a.atividades).forEach(e=>{ csv+=[_csvSafe(e.nome),_csvSafe(e.leaderId?(user(e.leaderId).nome||''):''),e.clientes,Math.round(e.patr),e.leadsAtivos,e.ganhos,e.conv+'%',e.atividades,e.tdone,e.tarefas].join(';')+'\n'; });
  csv+='\nEsforco por lider\nLider;Especialistas;Clientes;Patrimonio;Leads ativos;Conversao;Atividades;Tarefas concluidas\n';

  csv+='\nTotais\nClientes;'+d.VC.length+'\nPatrimonio sob gestao;'+Math.round(d.totPatr)+'\nPipeline CRM;'+Math.round(d.cs.pipeline)+'\nSobra mensal;'+Math.round(d.sob)+'\n';
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'})); a.download='Agion_relatorio_'+_ymd()+'.csv'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href)},3000);
