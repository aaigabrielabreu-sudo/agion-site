<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agion — Plataforma de Planejamento Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B2A26;--bg2:#0E322D;--card:#103A32;--card2:#144238;--card3:#184C40;
  --teal:#8FD9CC;--teal-ink:#0A2026;--gold:#C5A059;--gold2:#E8CC8B;
  --grad-gold:linear-gradient(115deg,#A8853E,#E8CC8B 45%,#C5A059 85%);
  --grad-hero:linear-gradient(100deg,#8FD9CC,#E8CC8B 50%,#C5A059);
  --ink:#DCE9E7;--muted:#9DB5B1;--soft:#6E8B88;--line:rgba(143,217,204,.16);--line-gold:rgba(197,160,89,.28);
  --head:#F2FAF8;
  --serif:'Lora',Georgia,serif;--display:'Cinzel',serif;--sans:'DM Sans',-apple-system,sans-serif;
  --ok:#34d399;--warn:#fbbf24;--bad:#f87171;
}
body.light{
  --bg:#FAFDFC;--bg2:#F1F7F4;--card:#E8F2EC;--card2:#E1EDE6;--card3:#D7E7DF;
  --teal:#0E4A41;--teal-ink:#ffffff;--gold:#8F6F2C;--gold2:#725421;
  --ink:#0B100E;--muted:#333C39;--soft:#5A6763;--line:rgba(14,74,65,.32);--line-gold:rgba(143,111,44,.42);
  --head:#050B09;
}
/* modo claro: fundo branco; TUDO acima do fundo = card verde da Agion c/ borda verde */
body.light .panel,body.light .ccard,body.light .actcard,body.light .kpi:not(.grad),body.light .intg{background:linear-gradient(180deg,#EDF5F0,#E3EFE8);border:1.5px solid rgba(14,74,65,.32);box-shadow:0 6px 20px rgba(11,42,38,.08)}
body.light input,body.light select,body.light textarea{background:#F3F8F5;color:var(--ink);border:1.5px solid rgba(14,74,65,.30)}
body.light{color:#0B100E}
/* chrome (barra lateral + topo) fica petroleo com texto claro no tema claro */
body.light .side,body.light .topbar{--ink:#DCE9E7;--head:#F2FAF8;--muted:#A6C1BB;--soft:#7E9A94}
/* ===== MODO CLARO — verde da Agion + BORDA em tudo acima do fundo ===== */
body.light .kcol{background:#EAF3EE;border:1.5px solid rgba(14,74,65,.30)}
body.light .lead,body.light .task{background:#F1F8F4;border:1.5px solid rgba(14,74,65,.28)}
body.light .coment .cb,body.light .j-step,body.light .chat-input{background:#EFF6F1;border:1.5px solid rgba(14,74,65,.26)}
body.light .chat-side{background:#EAF3EE;border:1.5px solid rgba(14,74,65,.26)}
body.light .chat-side .ch.on{background:rgba(14,74,65,.14)}
body.light .msg .mbubble{background:#F1F8F4;border:1.5px solid rgba(14,74,65,.26)}
body.light .msg.me .mbubble{background:#DCEFDE;border:1.5px solid rgba(14,74,65,.3)}
body.light .tbl-scroll thead th{background:#D7E7DF;color:var(--head)}
body.light .gsum{background:rgba(14,74,65,.14)}
body.light .banner{color:#6B531E;border:1.5px solid rgba(143,111,44,.42)}
body.light .disclaimer{color:var(--muted);background:#EFF6F1;border:1.5px solid rgba(14,74,65,.24)}
body.light .btn-teal{color:#0E4A41;background:rgba(15,81,71,.08);border:1.5px solid rgba(15,81,71,.35)}
body.light .btn-teal:hover{background:rgba(15,81,71,.14)}
body.light .btn-ghost{border:1.5px solid rgba(14,74,65,.35);color:#0E4A41}
body.light .tt-Consultoria{color:#7E6224;background:rgba(197,160,89,.12);border:1px solid rgba(197,160,89,.4)}
body.light .chip,body.light .chip-teal,body.light .tag-main,body.light .tag-copy,body.light .ttype,body.light .tt-Consórcio,body.light .tt-Planejamento{border:1px solid rgba(14,74,65,.30)}
body.light .chip-teal,body.light .tag-copy,body.light .tt-Planejamento{color:#0E4A41}
body.light .bell{background:rgba(15,81,71,.06);border:1.5px solid rgba(14,74,65,.30);color:var(--ink)}
/* Conversas (WhatsApp) — verde + borda em tudo */
body.light .wa{background:#EAF3EE;border:1.5px solid rgba(14,74,65,.30)}
body.light .wa-srch,body.light .wa-inp textarea,body.light .wa-md input,body.light .wa-md select{background:#F3F8F5;border:1.5px solid rgba(14,74,65,.30);color:var(--ink)}
body.light .wa-item{border:1px solid rgba(14,74,65,.16)}
body.light .wa-item:hover{background:rgba(14,74,65,.05)}
body.light .wa-item.on{background:rgba(14,74,65,.12);border-color:rgba(14,74,65,.4)}
body.light .wa-in{background:#F1F8F4;border:1.5px solid rgba(14,74,65,.26)}
body.light .wa-out{background:#DCEFDE;border:1.5px solid rgba(14,74,65,.30)}
body.light .wa-sys{background:rgba(197,160,89,.16);border:1px solid rgba(143,111,44,.4)}
body.light .wa-day{background:rgba(14,74,65,.12);opacity:1;color:var(--muted)}
body.light .wa-cico:hover,body.light .wa-pop button:hover{background:rgba(14,74,65,.08)}
body.light .wa-pop,body.light .wa-md{background:#EDF5F0;border:1.5px solid rgba(14,74,65,.3)}
body.light .wa-back,body.light .wa-cico{color:var(--ink)}
body.light .modal,body.light .notif{border:1.5px solid rgba(14,74,65,.32)}
body.light .opcard,body.light .diffbox,body.light .j-goal,body.light .ostep,body.light .ometa{border:1.5px solid rgba(14,74,65,.28)}
/* ===== acento VERDE da marca no claro (barras de destaque) ===== */
body.light .panel{border-left:4px solid #0E4A41}
body.light .kpi:not(.grad){border-top:4px solid #0E4A41}
body.light .ccard{border-top:4px solid #0E4A41}
body.light .lead{border-left:4px solid #0E4A41}
body.light .panel h2,body.light .ccard h2,body.light .ccard h3,body.light .actcard .achead b{color:#0B3A33}
body.light .kpi .lab{color:#0E4A41}
body.light .kpi:not(.grad) b{color:#0E4A41}
body.light .kcol h4{color:#0B3A33}
body.light h2{color:#0B3A33}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
body.light::before{opacity:.09}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:
 radial-gradient(46% 38% at 12% 8%,rgba(22,102,91,.45),transparent 70%),
 radial-gradient(40% 34% at 90% 14%,rgba(197,160,89,.10),transparent 70%),
 radial-gradient(55% 45% at 82% 95%,rgba(22,102,91,.38),transparent 70%)}
body::after{content:"";position:fixed;inset:-12%;z-index:-1;pointer-events:none;background-image:url('https://cdn.jsdelivr.net/gh/aaigabrielabreu-sudo/agionconsorcio@main/frontend/public/images/logo-agion.png');background-repeat:repeat;background-size:clamp(200px,18vw,290px);filter:blur(.6px);opacity:.06;transform:rotate(-10deg)}
body.light::after{display:none}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.serif{font-family:var(--serif)}
.hidden{display:none!important}
/* botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:12px;font-weight:700;font-size:.9rem;transition:.22s;white-space:nowrap}
.btn-gold{background:var(--grad-gold);color:var(--teal-ink)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(197,160,89,.4)}
.btn-teal{background:rgba(143,217,204,.1);border:1px solid rgba(143,217,204,.35);color:#BFEAE2}
.btn-teal:hover{background:rgba(143,217,204,.18)}
.btn-ghost{border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--gold)}
.btn-sm{padding:8px 14px;font-size:.8rem;border-radius:9px}
.btn-ico{padding:8px;width:34px;height:34px;border-radius:9px;border:1px solid var(--line)}
.btn-ico:hover{border-color:var(--gold);color:var(--gold2)}
.chip{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:5px 11px;border-radius:999px;background:rgba(197,160,89,.12);border:1px solid var(--line-gold);color:var(--gold2)}
.chip-teal{background:rgba(143,217,204,.1);border-color:rgba(143,217,204,.3);color:var(--teal)}
label{display:block;font-size:.78rem;font-weight:600;color:var(--head);margin:0 0 6px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:rgba(10,28,34,.5);color:var(--head);font-size:.92rem;outline:none;transition:.2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(197,160,89,.14)}
.field{margin-bottom:14px}
.note{font-size:.74rem;color:var(--soft);line-height:1.5}
/* ===== LOGIN ===== */
#loginView{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login{width:100%;max-width:440px;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:26px;padding:42px;box-shadow:0 30px 90px rgba(0,0,0,.55)}
.login .lg{font-family:var(--display);font-size:1.9rem;letter-spacing:.06em;text-align:center;color:var(--head)}
.login .lg em{font-style:normal;background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login .tg{text-align:center;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:2px 0 22px}
.tabs{display:flex;background:rgba(10,28,34,.6);border-radius:12px;padding:5px;gap:5px;margin-bottom:22px}
.tabs button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:.84rem;color:var(--muted);transition:.22s}
.tabs button.on{background:var(--grad-gold);color:var(--teal-ink)}
/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh}
#app.show{display:grid;grid-template-columns:248px 1fr}
.side{background:rgba(8,22,27,.85);backdrop-filter:blur(16px);border-right:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .brand{display:flex;flex-direction:column;line-height:1.1;padding:6px 10px 22px;border-bottom:1px solid var(--line);margin-bottom:14px}
.side .brand b{font-family:var(--display);font-size:1.4rem;color:var(--head);letter-spacing:.05em}
.side .brand span{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700}
.navi{display:flex;flex-direction:column;gap:4px;flex:1}
.navi a{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:11px;font-size:.9rem;font-weight:600;color:var(--muted);transition:.2s;cursor:pointer}
.navi a:hover{background:rgba(143,217,204,.06);color:var(--head)}
.navi a.on{background:rgba(197,160,89,.12);color:var(--gold2);border:1px solid var(--line-gold)}
.navi a svg{width:18px;height:18px;flex-shrink:0}
.side .foot{border-top:1px solid var(--line);padding-top:14px;font-size:.78rem;color:var(--soft)}
.side .foot .u{color:var(--head);font-weight:700;margin-bottom:2px}
.main{min-height:100vh;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:clamp(12px,1.5vw,16px) clamp(16px,3vw,30px);border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(11,42,38,.82);backdrop-filter:blur(16px);z-index:30;flex-wrap:wrap}
.topbar h1{font-family:var(--serif);font-size:1.35rem;color:var(--head);line-height:1.15}
.topbar .crumb{font-size:.72rem;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.tb-left{min-width:0}
.tb-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.userchip{display:flex;align-items:center;gap:9px;padding:5px 6px 5px 5px;border:1px solid var(--line);border-radius:999px}
.userchip .meta{line-height:1.3;display:flex;flex-direction:column;gap:3px}
.userchip .meta .nm{font-size:.82rem;font-weight:700;color:var(--head)}
.userchip .meta .rl{font-size:.64rem;color:var(--soft);letter-spacing:.3px}
.userchip .out{border:none;background:rgba(143,217,204,.08);color:var(--muted);font-size:.72rem;font-weight:700;padding:6px 11px;border-radius:999px}
.userchip .out:hover{color:var(--bad);background:rgba(248,113,113,.1)}
@media(max-width:560px){.userchip .meta{display:none}.topbar h1{font-size:1.15rem}}
.content{padding:clamp(18px,2.5vw,30px) clamp(18px,3vw,48px) 80px;max-width:none;width:100%}
.icon{width:1.2em;height:1.2em;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
/* cards / KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:20px}
.kpi .lab{font-size:.74rem;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.kpi .lab svg{width:15px;height:15px;color:var(--gold)}
.kpi b{font-family:var(--serif);font-size:1.55rem;color:var(--head);line-height:1}
.kpi.grad b{background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.panel{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:clamp(16px,2.2vw,24px);margin-bottom:clamp(14px,1.8vw,20px)}
.panel h2{font-family:var(--serif);font-size:1.08rem;color:var(--gold2);margin-bottom:16px;display:flex;align-items:center;gap:9px}
.panel h2 .right{margin-left:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0 18px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.ccard{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:20px;transition:.25s}
.ccard:hover{border-color:var(--line-gold);transform:translateY(-3px)}
.ccard h3{font-family:var(--serif);font-size:1.08rem;color:var(--head)}
.ccard .meta{font-size:.76rem;color:var(--soft);margin:4px 0 12px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 9px;border-radius:999px}
.tag-main{background:rgba(197,160,89,.15);color:var(--gold2);border:1px solid var(--line-gold)}
.tag-copy{background:rgba(143,217,204,.12);color:var(--teal);border:1px solid rgba(143,217,204,.3)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.toolbar .sp{flex:1}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--gold2);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em}
td.r,th.r{text-align:right}
canvas{width:100%!important;height:280px!important}
div[style*="height"]>canvas{height:100%!important}
.gauge canvas{height:150px!important}
.prob{display:inline-flex;align-items:center;gap:8px;font-weight:700;padding:8px 18px;border-radius:999px;font-size:.92rem}
.gauge{position:relative;width:150px;height:150px;margin:0 auto}
.disclaimer{font-size:.74rem;color:var(--soft);background:rgba(143,217,204,.05);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin-top:16px;line-height:1.6}
.banner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(197,160,89,.08);border:1px solid var(--line-gold);border-radius:14px;padding:13px 16px;margin-bottom:18px;font-size:.85rem;color:#E8E0CC}
/* oportunidades (estratégias exclusivas) */
.ops{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.opcard{display:flex;gap:13px;background:linear-gradient(160deg,var(--card3),var(--card2));border:1px solid var(--line-gold);border-radius:15px;padding:16px;transition:transform .25s,box-shadow .25s}
.opcard:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,.32)}
.opic{flex-shrink:0;width:42px;height:42px;border-radius:12px;background:rgba(197,160,89,.14);display:grid;place-items:center;color:var(--gold2)}
.opic svg{width:22px;height:22px}
.optag{display:inline-block;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--gold2);background:rgba(197,160,89,.12);border:1px solid var(--line-gold);padding:3px 9px;border-radius:999px;margin-bottom:7px}
.opbody h3{font-family:var(--serif);font-size:1.02rem;color:var(--head);margin:2px 0 6px;line-height:1.25}
.opbody p{font-size:.84rem;color:var(--ink);line-height:1.55;margin-bottom:12px}
@media(max-width:760px){.ops{grid-template-columns:1fr}}

/* caixa diferencial Agion (premium) */
.diffbox{display:flex;gap:14px;align-items:flex-start;background:linear-gradient(135deg,rgba(197,160,89,.16),rgba(143,217,204,.06));border:1px solid var(--line-gold);border-radius:16px;padding:18px;margin-bottom:18px;position:relative;overflow:hidden}
.diffbox::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grad-gold)}
.diffbox .diffic{flex-shrink:0;width:46px;height:46px;border-radius:13px;background:rgba(197,160,89,.18);display:grid;place-items:center;color:var(--gold2)}
.diffbox .diffic svg{width:24px;height:24px}
.diffbox h3{font-family:var(--serif);font-size:1.08rem;color:var(--gold2);margin:0 0 5px}
.diffbox p{font-size:.9rem;line-height:1.6;color:var(--ink);margin:0}
.diffbox b{color:var(--head)}
@media(max-width:560px){.diffbox{padding:15px;gap:11px}.diffbox .diffic{width:40px;height:40px}}

.locked input,.locked select,.locked textarea,.locked .additem,.locked .delrow{pointer-events:none;opacity:.55}
.locked .lever input[type=range]{pointer-events:auto!important;opacity:1!important}
/* itens (linhas dinâmicas) */
.item{display:grid;grid-template-columns:1fr 130px 120px 34px;gap:8px;align-items:end;margin-bottom:8px}
.item.assets{grid-template-columns:1fr 150px 130px 34px}
.item .delrow{align-self:center;margin-bottom:2px}
.additem{margin-top:6px}
.bar{height:8px;border-radius:5px;background:rgba(143,217,204,.1);overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;border-radius:5px;background:var(--grad-hero)}
/* ===== EDITOR EM SEÇÕES ===== */
.subnav{display:flex;gap:6px;overflow-x:auto;margin:4px 0 20px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.subnav button{white-space:nowrap;padding:9px 14px;border-radius:999px;font-size:.82rem;font-weight:700;color:var(--muted);border:1px solid transparent;transition:.2s}
.subnav button.on{color:var(--gold2);background:rgba(197,160,89,.12);border-color:var(--line-gold)}
.subnav button:hover{color:var(--head)}
.plansec{display:none}
.plansec.on{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.netrow{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-bottom:1px solid var(--line);font-size:.92rem;color:var(--muted)}
.netrow b{color:var(--head);font-family:var(--serif);font-size:1.05rem}
.netrow.tot{border-bottom:none;margin-top:4px}
.netrow.tot b{background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:1.3rem}
.tbl-scroll{max-height:440px;overflow:auto;border:1px solid var(--line);border-radius:12px}
.tbl-scroll table{font-size:.82rem}
.tbl-scroll thead th{position:sticky;top:0;background:#103A32;z-index:1}
.lineleg{display:flex;gap:18px;flex-wrap:wrap;font-size:.8rem;margin:0 0 14px}
.lineleg span{display:inline-flex;align-items:center;gap:7px;color:var(--muted)}
.lineleg i{width:18px;height:3px;border-radius:2px;display:inline-block}
.gloss dt{font-weight:700;color:var(--gold2);font-size:.92rem;margin-top:14px}
.gloss dd{margin:3px 0 0;font-size:.87rem;color:var(--ink);line-height:1.55}
/* ===== AVATAR / FEED / CHAT / CAPTAÇÃO ===== */
.av{flex-shrink:0;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#0A2026;font-family:var(--sans)}
.feed-comp{display:flex;gap:12px;margin-bottom:18px}
.feed-comp textarea{min-height:46px;resize:vertical}
.post{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--line)}
.post .pbody{flex:1}
.post .phead{display:flex;align-items:baseline;gap:8px}
.post .pname{font-weight:700;color:var(--head);font-size:.92rem}
.post .ptime{font-size:.72rem;color:var(--soft)}
.post .ptext{font-size:.9rem;color:var(--ink);line-height:1.55;margin:4px 0 8px;white-space:pre-wrap}
.post .pacts{display:flex;gap:16px;font-size:.78rem;color:var(--muted)}
.post .pacts button{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
.post .pacts button:hover{color:var(--gold2)}
.post .pacts button.liked{color:#f87171}
.post .pacts button.liked svg{fill:#f87171;stroke:#f87171}
.coment{display:flex;gap:9px;margin-top:10px}
.coment .cb{flex:1;background:rgba(10,28,34,.45);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.coment .cn{font-weight:700;color:var(--head);font-size:.8rem}
.coment .cx{font-size:.84rem;color:var(--ink);line-height:1.4}
.chat-wrap{display:grid;grid-template-columns:200px 1fr;gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;height:560px}
.chat-side{background:rgba(10,28,34,.5);border-right:1px solid var(--line);padding:12px;overflow-y:auto}
.chat-side .ch{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--muted)}
.chat-side .ch:hover{background:rgba(143,217,204,.06)}
.chat-side .ch.on{background:rgba(197,160,89,.12);color:var(--gold2)}
.chat-main{display:flex;flex-direction:column;min-width:0}
.chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:78%}
.msg .mbubble{background:var(--card2);border:1px solid var(--line);border-radius:4px 14px 14px 14px;padding:9px 13px}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg.me .mbubble{background:rgba(197,160,89,.14);border-color:var(--line-gold);border-radius:14px 4px 14px 14px}
.msg .mn{font-size:.74rem;font-weight:700;color:var(--gold2);margin-bottom:2px}
.msg .mt{font-size:.88rem;color:var(--ink);line-height:1.4}
.msg .mtime{font-size:.64rem;color:var(--soft);margin-top:3px}
.chat-input{display:flex;gap:10px;padding:12px;border-top:1px solid var(--line);background:rgba(10,28,34,.4)}
.chat-input input{flex:1}
.intg{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.intg .src{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:.95rem;flex-shrink:0}
.src-Google{background:#fff;color:#4285F4;border:1px solid #e0e0e0}
.src-Meta{background:#0866FF;color:#fff}
.dot-on{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;box-shadow:0 0 8px var(--ok)}
.dot-off{width:8px;height:8px;border-radius:50%;background:var(--soft);display:inline-block}
.lead-src{font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:5px}
@media(max-width:860px){.chat-wrap{grid-template-columns:1fr;height:auto}.chat-side{display:flex;gap:6px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line)}.chat-msgs{height:360px}.msg{max-width:90%}}
/* ===== CRM KANBAN ===== */
.kanban{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 10px}
.kcol{flex:1 0 232px;background:rgba(10,28,34,.5);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column}
.kcol h4{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gold2);display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kcol .ksum{font-size:.72rem;color:var(--soft);margin-bottom:10px}
.kcol .kbody{display:flex;flex-direction:column;gap:10px;min-height:30px}
.lead{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:12px;padding:12px;cursor:default;transition:.2s}
.lead:hover{border-color:var(--line-gold)}
.lead .nm{font-weight:700;color:var(--head);font-size:.9rem}
.lead .ct{font-size:.74rem;color:var(--muted);margin:2px 0 8px}
.lead .vl{font-family:var(--serif);color:var(--gold2);font-size:.95rem}
.lead .acts{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.lead .acts button{font-size:.7rem;padding:5px 8px;border-radius:7px;border:1px solid var(--line);color:var(--muted)}
.lead .acts button:hover{border-color:var(--gold);color:var(--gold2)}
.ttype{display:inline-block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:999px;margin-bottom:8px}
.tt-Consórcio{background:rgba(197,160,89,.16);color:var(--gold2);border:1px solid var(--line-gold)}
.tt-Planejamento{background:rgba(143,217,204,.12);color:var(--teal);border:1px solid rgba(143,217,204,.3)}
.tt-Consultoria{background:rgba(232,204,139,.1);color:#E8CC8B;border:1px solid rgba(232,204,139,.3)}
.task{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:linear-gradient(160deg,var(--card2),var(--card))}
.task.done{opacity:.55}
.task.done .tk-t{text-decoration:line-through}
.task .tk-cb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line-gold);flex-shrink:0;cursor:pointer;display:grid;place-items:center;color:var(--gold2);font-weight:800}
.task .tk-t{flex:1;font-size:.9rem;color:var(--head)}
.task .tk-d{font-size:.74rem;color:var(--soft)}
/* ===== ORGANOGRAMA VERTICAL DE METAS ===== */
.journey{position:relative;padding:6px 0 6px 4px}
.j-node{position:relative;padding-left:48px;padding-bottom:30px}
.j-node:last-child{padding-bottom:0}
.j-node::before{content:"";position:absolute;left:17px;top:34px;bottom:-4px;width:2px;background:linear-gradient(var(--gold),rgba(143,217,204,.3))}
.j-node:last-child::before{display:none}
.j-dot{position:absolute;left:0;top:0;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:.95rem;background:var(--grad-gold);color:var(--teal-ink);box-shadow:0 0 0 4px rgba(197,160,89,.12),0 6px 18px rgba(0,0,0,.35);z-index:1}
.j-goal{background:linear-gradient(160deg,var(--card3),var(--card2));border:1px solid var(--line-gold);border-radius:15px;padding:15px 18px}
.j-goal .row{align-items:flex-start}
.j-goal h3{font-family:var(--serif);font-size:1.06rem;color:var(--head);line-height:1.2}
.j-goal .when{font-size:.74rem;color:var(--gold2);font-weight:700;white-space:nowrap;margin-left:10px}
.j-goal .gval{font-size:.82rem;color:var(--teal);font-weight:700;margin-top:2px}
.j-steps{list-style:none;margin:12px 0 0;display:grid;gap:8px}
.j-step{display:flex;gap:10px;align-items:flex-start;background:rgba(10,28,34,.4);border:1px solid var(--line);border-radius:11px;padding:9px 12px}
.j-step .n{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(143,217,204,.14);color:var(--teal);font-size:.7rem;font-weight:800;display:grid;place-items:center;margin-top:1px}
.j-step .tx{font-size:.85rem;color:var(--ink);line-height:1.45;flex:1}
.j-step .x{cursor:pointer;color:var(--soft);font-size:.85rem;padding:0 2px}
.j-step .x:hover{color:var(--bad)}
.j-addstep{display:flex;gap:8px;margin-top:10px}
.j-addstep input{flex:1}

/* organograma responsivo (vertical no mobile, horizontal no desktop) */
.orgmap{padding:4px 0}
.osteps{display:flex;flex-direction:column;gap:0;align-items:stretch}
.ostep{flex:1;background:linear-gradient(160deg,var(--card3),var(--card2));border:1px solid var(--line-gold);border-radius:13px;padding:12px 16px;text-align:center;transition:transform .2s,border-color .2s}
.ostep:hover{transform:translateY(-2px);border-color:var(--gold)}
.ostep b{display:block;font-family:var(--serif);font-size:1rem;color:var(--head);line-height:1.2}
.ostep span{font-size:.76rem;color:var(--gold2)}
.ostep.meta{background:rgba(197,160,89,.12)}
.oarrow{display:block;text-align:center;color:var(--gold);font-size:1.05rem;line-height:1;margin:5px 0;opacity:.85}
.ometas{margin-top:16px}
.olabel{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);font-weight:700;margin-bottom:8px}
.ometagrid{display:grid;gap:10px;grid-template-columns:1fr}
.ometa{background:rgba(143,217,204,.08);border:1px solid rgba(143,217,204,.3);border-radius:12px;padding:11px 14px;text-align:center;transition:transform .2s}
.ometa:hover{transform:translateY(-2px)}
.ometa b{display:block;font-family:var(--serif);color:var(--head);font-size:.95rem}
.ometa span{font-size:.78rem;color:var(--teal)}
@media(min-width:861px){
  .osteps{flex-direction:row;align-items:stretch;gap:0}
  .osteps .oarrow{transform:rotate(-90deg);margin:0;align-self:center}
  .ometagrid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
}

.flash{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--grad-gold);color:var(--teal-ink);font-weight:700;padding:13px 26px;border-radius:999px;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:500;opacity:0;transition:.3s;font-size:.9rem}
.flash.show{opacity:1;bottom:34px}
/* ===== POLIMENTO GERAL DE UX ===== */
.kpi{transition:transform .22s,border-color .22s}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-gold)}
.panel{transition:border-color .2s}
.content{animation:pageIn .35s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(143,217,204,.18);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:rgba(197,160,89,.45)}
.btn:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.navi a{transition:background .2s,color .2s,transform .15s}
.navi a:hover{transform:translateX(2px)}
.side .brand b{background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mob-brand{display:none}
@media(max-width:860px){
  .mob-brand{display:flex;align-items:center;gap:8px;font-family:var(--display);font-size:1.05rem;color:var(--head);letter-spacing:.05em;padding-right:6px}
  .mob-brand span{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
}
/* ===== MEUS GASTOS (estilo Mobills) ===== */
.month-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px}
.month-nav b{font-family:var(--serif);font-size:1.1rem;color:var(--head);min-width:150px;text-align:center}
.month-nav button{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);color:var(--ink)}
.month-nav button:hover{border-color:var(--gold);color:var(--gold2)}
.gsum{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:20px}
.gsum div{background:linear-gradient(165deg,var(--card2),var(--card));padding:16px;text-align:center}
.gsum .lab{font-size:.72rem;color:var(--muted);margin-bottom:5px}
.gsum b{font-family:var(--serif);font-size:1.15rem;display:block}
.catrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.catrow .ci{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:1.05rem;flex-shrink:0}
.catrow .cmid{flex:1;min-width:0}
.catrow .cn{font-size:.9rem;color:var(--head);font-weight:600}
.catrow .cbar{height:6px;border-radius:4px;background:rgba(143,217,204,.1);margin-top:5px;overflow:hidden}
.catrow .cbar i{display:block;height:100%;border-radius:4px}
.catrow .cval{text-align:right;flex-shrink:0}
.catrow .cval b{font-size:.9rem;color:var(--head)}
.catrow .cval span{font-size:.7rem;color:var(--soft);display:block}
.lanc{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.lanc .li{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:.95rem;flex-shrink:0}
.lanc .lm{flex:1;min-width:0}
.lanc .ld{font-size:.88rem;color:var(--head);font-weight:600}
.lanc .ls{font-size:.72rem;color:var(--soft)}
.lanc .lv{font-weight:700;font-size:.9rem;white-space:nowrap}
.lanc .lx{cursor:pointer;color:var(--soft);font-size:.85rem;padding:0 4px}
.lanc .lx:hover{color:var(--bad)}
.fab{position:fixed;right:24px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--grad-gold);color:var(--teal-ink);font-size:1.7rem;font-weight:700;box-shadow:0 12px 30px rgba(197,160,89,.45);z-index:55;display:grid;place-items:center}
.fab:hover{transform:scale(1.06)}
@media(max-width:860px){.fab{bottom:84px}}
/* sliders */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:5px;background:rgba(143,217,204,.18);outline:none;margin-top:6px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--grad-gold);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:#C5A059;cursor:pointer}
.lever label{display:block;font-size:.85rem;color:var(--ink);font-weight:600;margin-bottom:6px}
.lever label b{color:var(--gold2);float:right}
/* sino de notificações */
.bell{position:relative;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink);background:rgba(143,217,204,.05)}
.bell:hover{border-color:var(--gold);color:var(--gold2)}
.bell .badge{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--bad);color:#fff;font-size:.62rem;font-weight:800;display:grid;place-items:center;box-shadow:0 0 0 2px var(--bg)}
.notif{position:absolute;top:54px;right:0;width:330px;max-width:88vw;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line-gold);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);z-index:80;overflow:hidden}
.notif h4{padding:14px 16px;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold2);border-bottom:1px solid var(--line)}
.notif .ni{display:flex;gap:11px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
.notif .ni:hover{background:rgba(143,217,204,.06)}
.notif .ni .dot{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:.9rem}
.notif .ni .tx{font-size:.84rem;color:var(--ink);line-height:1.4}
.notif .ni .tm{font-size:.7rem;color:var(--soft);margin-top:2px}
.notif .empty{padding:26px 16px;text-align:center;color:var(--soft);font-size:.85rem}
.bells{display:flex;gap:6px;align-items:center}
.bell3{position:relative;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bc);display:grid;place-items:center;background:color-mix(in srgb,var(--bc) 13%,transparent);color:var(--bc);font-weight:800;font-size:.82rem;cursor:pointer;transition:.15s}
.bell3:hover{background:color-mix(in srgb,var(--bc) 24%,transparent)}
.bell3 .badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--bad);color:#fff;font-size:.6rem;font-weight:800;display:grid;place-items:center;box-shadow:0 0 0 2px var(--bg)}
.notif .nlist{max-height:min(58vh,440px);overflow:auto}
.notif h4{display:flex;align-items:center;gap:8px}
.notif h4 .nlet{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;color:#062521;font-weight:800;font-size:.72rem;flex-shrink:0}
.notif h4 .nread{margin-left:auto;background:none;border:0;color:var(--soft);font-size:.64rem;cursor:pointer;text-transform:none;letter-spacing:0;padding:0}
.notif h4 .nread:hover{color:var(--gold2)}
.notif .ni.unread{background:color-mix(in srgb,var(--bc) 9%,transparent)}
@media(max-width:560px){.notif{width:min(300px,91vw)}.notif .nlist{max-height:62vh}.bell3{width:31px;height:31px;font-size:.75rem}.bells{gap:5px}}
.actgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:16px}
.actcard{position:relative;background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:22px 20px 18px}
.actcard .achead{display:flex;align-items:center;gap:14px;padding-right:36px}
.actcard .acres{margin-top:14px;min-height:20px;line-height:1.5}
.actcard .acbtn{margin-top:16px;width:100%}
.actbadge{position:absolute;top:-11px;right:-11px;min-width:30px;height:30px;padding:0 9px;border-radius:15px;background:var(--bad);color:#fff;font-weight:800;font-size:.82rem;display:grid;place-items:center;box-shadow:0 0 0 4px var(--bg)}
.viewbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#6d531f,#8a6c2c);color:#fff;padding:9px 16px;font-size:.85rem;font-weight:600}
.viewbar .btn{margin-left:auto}
/* skeleton */
.skel{padding:8px 0}
.skel .sk{background:linear-gradient(90deg,rgba(143,217,204,.06),rgba(143,217,204,.14),rgba(143,217,204,.06));background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:12px;margin-bottom:14px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* drag and drop */
.lead{cursor:grab}
.lead.dragging{opacity:.4}
.kbody.dragover{outline:2px dashed var(--gold);outline-offset:3px;border-radius:10px;background:rgba(197,160,89,.06)}
/* monograma da marca */
.logo-mark{width:40px;height:40px;flex-shrink:0}
.login .logo-mark{width:54px;height:54px;margin:0 auto 10px;display:block}
.logo-img{height:46px;width:auto;display:block;margin:0 auto 12px;object-fit:contain}
.side .logo-img{height:34px;margin:0}
.top-logo{height:30px;width:auto;display:none;margin-right:4px}
body.light .logo-img,body.light .top-logo{filter:none}
@media(max-width:860px){.top-logo{display:block}}
.modal-bg{position:fixed;inset:0;background:rgba(4,12,14,.72);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line-gold);border-radius:18px;padding:28px;width:100%;max-width:430px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal h3{font-family:var(--serif);font-size:1.2rem;color:var(--head);margin-bottom:10px}
.modal p{color:var(--muted);font-size:.9rem;margin-bottom:10px;line-height:1.5}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.mobnav{display:none}
@media(max-width:860px){
  #app.show{grid-template-columns:1fr}
  .side{display:none}
  .mobnav{display:flex;justify-content:space-between;gap:1px;padding:7px 4px calc(7px + env(safe-area-inset-bottom,0px));position:fixed;left:0;right:0;bottom:0;top:auto;background:rgba(8,22,27,.97);backdrop-filter:blur(18px);border-top:1px solid var(--line-gold);z-index:70;overflow:hidden}
  .mobnav::-webkit-scrollbar{display:none}
  .mobnav a{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:12px;font-size:.56rem;font-weight:700;color:var(--soft);text-align:center}
  .mobnav a span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mobnav a .icon{width:20px;height:20px;stroke-width:1.8;flex-shrink:0}
  .mobnav a.on{color:var(--gold2)}
  .mobnav a.on .icon{filter:drop-shadow(0 0 6px rgba(197,160,89,.5))}
  .mobnav .mob-brand{display:none}
  .content{padding:18px 15px 96px}
  .topbar{padding:13px 16px;position:static}
  .grid2{grid-template-columns:1fr}
  .item{grid-template-columns:1fr 1fr;}
  .item .delrow{grid-column:2;justify-self:end}

/* ===================== MOTOR DE PROJEÇÃO ===================== */
const mensal=(v,f)=>f==='Anual'?v/12:v;
function totals(p){
  const renda=(p.incomes||[]).reduce((s,i)=>s+mensal(i.valor,i.freq),0);
  const desp=(p.expenses||[]).reduce((s,i)=>s+mensal(i.valor,i.freq),0);
  const patr=(p.assets||[]).reduce((s,i)=>s+(+i.valor||0),0);
  const passivos=(p.debts||[]).reduce((s,i)=>s+(+i.valor||0),0);
  return{renda,desp,patr,sobra:renda-desp,passivos,liquido:patr-passivos};
}
/* Alocação sugerida por perfil (modelo IPS, adaptado ao mercado BR) */
const ALOC={
  Conservador:{'Renda Fixa':75,'Multimercado':8,'Renda Variável':7,'Imóvel':5,'Internacional':5},
  Moderado:{'Renda Fixa':50,'Renda Variável':22,'Internacional':12,'Multimercado':8,'Imóvel':8},
  Arrojado:{'Renda Fixa':28,'Renda Variável':40,'Internacional':18,'Multimercado':9,'Imóvel':5}
};
const COR_CLASSE={'Renda Fixa':'#C5A059','Renda Variável':'#8FD9CC','Internacional':'#E8CC8B','Multimercado':'#4Fa3a3','Imóvel':'#B0875F','Previdência':'#7FB0A9','Outros':'#6E8B88'};
let _z=null;function gauss(){if(_z!==null){const z=_z;_z=null;return z}let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();const m=Math.sqrt(-2*Math.log(u));_z=m*Math.sin(2*Math.PI*v);return m*Math.cos(2*Math.PI*v)}
function projetar(p){
  const t=totals(p); const r=(p.rent||0)/100;
  const aporteAnual=Math.max(0,t.sobra)*12;
  const apos=p.apos, idade=p.idade, vida=Math.max(apos+1,p.vida);
  const anosAcum=Math.max(0,apos-idade), anosRenda=Math.max(1,vida-apos);
  const goalRenda=(p.goals||[]).find(g=>g.tipo==='renda');
  const saqueAnual=(goalRenda?goalRenda.valor:0)*12;
  const metas=(p.goals||[]).filter(g=>g.tipo==='meta');
  const idades=[]; for(let a=idade;a<=vida;a++) idades.push(a);
  // consórcio: parcelas pagas (saída) e contemplação da carta (entrada de patrimônio)
  const cons=(p.consorcios||[]);
  const consFee=co=>co.tipo==='Auto'?0.16:0.22;
  // {s: parcela paga, e: carta capitalizada que entra no portfólio, rent: aluguel anual se virar imóvel}
  function consAt(yr){let s=0,e=0,rent=0;cons.forEach(co=>{const cr=+co.credito||0;const prazo=+co.prazoMeses||200;const cm=+co.contemplaMes||12;const cYr=Math.floor(cm/12);const integral=cr*(1+consFee(co))/prazo;const meia=integral/2;for(let k=0;k<12;k++){const mi=yr*12+k;if(mi>=0&&mi<prazo)s+=(mi<cm?meia:integral);}
    if(co.uso==='imovel'){ if(yr>=cYr) rent += cr*(((+co.aluguel)||0.8)/100)*12; }   // imóvel: gera aluguel a partir da contemplação
    else { if(cYr===yr) e+=cr; }                                                       // capitalizar: carta entra no portfólio
  });return{s,e,rent};}
  const consImovel=cons.filter(co=>co.uso==='imovel').reduce((s,co)=>s+(+co.credito||0),0);
  // gera uma série de patrimônio para uma dada taxa (3 cenários: preta/verde/vermelha)
  function serieFor(rate){
    const arr=[]; let pat=t.patr;
    for(let a=idade;a<=apos;a++){ arr.push(Math.max(0,pat));
      const gm=metas.filter(g=>(g.idade||apos)===a).reduce((s,g)=>s+(+g.valor||0),0);
      const cc=consAt(a-idade);
      pat=(pat-gm+cc.e)*(1+rate)+aporteAnual-cc.s+cc.rent; }
    let pd=pat;
    for(let a=apos+1;a<=vida;a++){ const cc=consAt(a-idade); pd=(pd+cc.e)*(1+rate)-saqueAnual-cc.s+cc.rent; arr.push(Math.max(0,pd)); }
    return arr;
  }
  const spread=({Conservador:.02,Moderado:.03,Arrojado:.045}[p.perfil]||.025);
  const serie=serieFor(r);                       // linha preta (cenário atual)
  const serieOtim=serieFor(r+spread);            // linha verde (otimista)
  const seriePess=serieFor(Math.max(0,r-spread));// linha vermelha (pessimista)
  const idxApos=apos-idade;
  const patApos=serie[idxApos]!==undefined?serie[idxApos]: (serie[serie.length-1]||0);
  // balanço financeiro ano a ano (receita, despesa, saldo por idade)
  const rendaAnual=t.renda*12, despAnual=t.desp*12;
  const balanco=idades.map(a=>{ const work=a<apos;
    const receita=work?rendaAnual:saqueAnual; const despesa=despAnual;
    return {idade:a, receita, despesa, saldo:receita-despesa, patrimonio:serie[a-idade]||0}; });
  const fatorDep=r>0?(1-Math.pow(1+r,-anosRenda))/r:anosRenda;
  const alvoConsumo=saqueAnual*fatorDep;
  const alvoManter=r>0?saqueAnual/r:saqueAnual*anosRenda;
  const fvFator=r>0?(Math.pow(1+r,anosAcum)-1)/r:anosAcum;
  const fvPatr=t.patr*Math.pow(1+r,anosAcum);
  const aporteIdeal=anosAcum>0?Math.max(0,(alvoConsumo-fvPatr)/fvFator):0;
  // Monte Carlo
  const vol={Conservador:.05,Moderado:.10,Arrojado:.16}[p.perfil]||.08;
  let ok=0,N=500;
  for(let s=0;s<N;s++){let v=t.patr;
    for(let a=idade;a<apos;a++){const gm=metas.filter(g=>(g.idade||apos)===a).reduce((x,g)=>x+(+g.valor||0),0);const cc=consAt(a-idade);v=(v-gm+cc.e)*(1+r+gauss()*vol)+aporteAnual-cc.s+cc.rent;}
    let alive=true;for(let a=apos;a<vida;a++){const cc=consAt(a-idade);v=(v+cc.e)*(1+r+gauss()*vol)-saqueAnual-cc.s+cc.rent;if(v<-1){alive=false;break}}
    if(alive)ok++;}
  const reservaIdeal=t.desp*6;
  const reservaAtual=(p.assets||[]).filter(a=>a.cat==='Renda Fixa').reduce((s,a)=>s+(+a.valor||0),0);
  const cobertura=alvoConsumo>0?Math.min(100,Math.round(patApos/alvoConsumo*100)):100;
  const prob=Math.round(ok/N*100);
  const clamp=(x)=>Math.max(0,Math.min(1,x));
  const poupScore=clamp((t.renda>0?t.sobra/t.renda:0)/0.20)*100;
  const reservaScore=reservaIdeal>0?clamp(reservaAtual/reservaIdeal)*100:100;
  const saude=Math.round(0.5*prob+0.25*reservaScore+0.25*poupScore);
  // proteção: necessidade de seguro de vida (cobre dívidas + anos de despesa - ativos líquidos)
  const protAnos=apos>idade?Math.min(10,apos-idade):5;
  const seguroIdeal=Math.max(0, t.passivos + despAnual*protAnos - t.patr);
  const seguroAtual=(+(p.seguro&&p.seguro.atual)||0);
  const taxaSaque=patApos>0?saqueAnual/patApos*100:0;
  const consCredito=cons.reduce((s,co)=>s+(+co.credito||0),0);
  const consParcela=cons.reduce((s,co)=>s+(+co.credito||0)*(1+consFee(co))/((+co.prazoMeses)||200)/2,0);
  const consAluguel=cons.filter(co=>co.uso==='imovel').reduce((s,co)=>s+(+co.credito||0)*(((+co.aluguel)||0.8)/100),0);
  const numIndep=(saqueAnual||despAnual)/0.04;
  const indepPct=numIndep>0?Math.min(100,Math.round(t.patr/numIndep*100)):0;
  return{...t,aporteAnual,anosAcum,anosRenda,saqueAnual,patApos,alvoConsumo,alvoManter,aporteIdeal,prob,idades,serie,serieOtim,seriePess,balanco,rendaAnual,despAnual,metas,reservaIdeal,reservaAtual,cobertura,saude,seguroIdeal,seguroAtual,taxaSaque,consCredito,consParcela,consImovel,consAluguel,numIndep,indepPct,poupanca:(t.renda>0?Math.round(t.sobra/t.renda*100):0)};
}
/* ----- DIAGNÓSTICO INTELIGENTE (linguagem de assessor) ----- */
function diagnostico(p,R){
  const d=[]; const idealMes=R.aporteIdeal/12;
  if(R.prob>=80) d.push(['ok',`Plano consistente: cerca de <b>${R.prob}%</b> de chance de manter a renda desejada até os ${p.vida} anos.`]);
  else if(R.prob>=55) d.push(['warn',`Plano em rota de atenção (<b>${R.prob}%</b>). Pequenos ajustes elevam bastante a segurança.`]);
  else d.push(['bad',`Risco elevado de o patrimônio não durar (<b>${R.prob}%</b>). Vale revisar aporte, prazo ou meta de renda.`]);
  if(idealMes>R.sobra+1){const dif=idealMes-Math.max(0,R.sobra);d.push(['warn',`Para atingir a meta no prazo, o aporte ideal é <b>${BRL(idealMes)}/mês</b> — ${BRL(dif)} acima da sua sobra atual.`]);}
  else if(R.sobra>0) d.push(['ok',`Sua capacidade de aporte (<b>${BRL(R.sobra)}/mês</b>) já cobre o necessário para a meta.`]);
  if(R.reservaAtual<R.reservaIdeal) d.push(['warn',`Reserva de emergência abaixo do ideal: <b>${BRL(R.reservaAtual)}</b> de ${BRL(R.reservaIdeal)} (6 meses de despesas em renda fixa).`]);
  else d.push(['ok',`Reserva de emergência adequada — pelo menos 6 meses de despesas em liquidez.`]);
  if(R.prob<70 && p.apos<70) d.push(['warn',`Cenário alternativo: adiar a aposentadoria para os <b>${p.apos+2}</b> anos tende a elevar bastante a probabilidade de sucesso.`]);
  const aloc={Conservador:'foco em renda fixa e baixa volatilidade',Moderado:'mix equilibrado entre renda fixa e variável',Arrojado:'maior peso em renda variável e ativos de crescimento'}[p.perfil];
  if(aloc) d.push(['ok',`Perfil <b>${p.perfil}</b>: alocação sugerida com ${aloc}.`]);
  return d;
}

function defaultSteps(p,g){
  const r=projetar(p); const aporte=Math.max(0,r.sobra);
  if(g.tipo==='renda'){
    return [
      `Garantir a reserva de emergência: ${BRL(p.expenses?totals(p).desp*6:0)} (6 meses de despesas) em liquidez.`,
      `Aportar mensalmente cerca de ${BRL(Math.max(aporte,r.aporteIdeal/12))} em investimentos de longo prazo.`,
      `Manter a alocação coerente com o perfil ${p.perfil} e diversificar entre classes de ativos.`,
      `Revisar o plano a cada 12 meses e ajustar aportes conforme a evolução da renda.`,
      `Aos ${g.idade||p.apos} anos, iniciar os resgates programados para gerar a renda de ${BRL(g.valor)}/mês.`
    ];
  }
  const anos=Math.max(1,(g.idade||p.apos)-p.idade);
  return [
    `Definir o valor-alvo: ${BRL(g.valor)} até os ${g.idade||p.apos} anos.`,
    `Reservar aproximadamente ${BRL((+g.valor||0)/(anos*12))}/mês em uma aplicação separada para este objetivo.`,
    `Usar investimentos de baixo risco e liquidez compatível com o prazo de ${anos} ano(s).`,
    `Acompanhar o progresso e corrigir o valor conforme a inflação.`
  ];
}
function ensureSteps(p){ (p.goals||[]).forEach(g=>{ if(!Array.isArray(g.passos)||!g.passos.length) g.passos=defaultSteps(p,g); }); }
/* ===== ORGANOGRAMA HORIZONTAL (etapas + bifurcação nas metas) ===== */
function trunc(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}
function roadmapSVG(p){
  const apos=p.apos;
  const goals=(p.goals||[]).slice().sort((a,b)=>((a.idade||apos)-(b.idade||apos)));
  const phases=[['Diagnóstico','raio-x financeiro hoje'],['Reserva','6 meses de despesas'],['Acumulação','aporte mensal investido'],['Metas','objetivos do cliente'],['Independência','aos '+apos+' anos']];
  const arrow='<i class="oarrow">↓</i>';

function probBand(prob){
  if(prob>=80) return {cor:'var(--ok)',t:'Confortável',d:'Plano consistente. O caminho está traçado — mantenha os aportes e faça a revisão anual com seu especialista.'};
  if(prob>=55) return {cor:'var(--warn)',t:'Razoável',d:'Você está no caminho, mas pequenos ajustes deixam o plano bem mais seguro. Veja as alavancas abaixo.'};
  return {cor:'var(--bad)',t:'Requer atenção',d:'O dinheiro pode não durar todo o período desejado. Vale rever aporte, prazo ou meta de renda — as alavancas abaixo mostram o impacto de cada mudança.'};
}
function sakeBlock(p,R){
  const tx=R.taxaSaque||0, mensal=(R.saqueAnual||0)/12;
  if(!R.saqueAnual) return '';
  const scaleMax=Math.max(8,Math.ceil(tx/2)*2+2);
  const safePct=4/scaleMax*100, markPct=Math.min(98,tx/scaleMax*100);
  const cor=tx<=4.5?'var(--ok)':tx<=6.5?'var(--warn)':'var(--bad)';
  return `<div style="margin-top:16px"> <h3 class="serif" style="font-size:.98rem;color:var(--gold2);margin:0 0 8px">Sua taxa de saque na aposentadoria</h3> <p style="font-size:.9rem;line-height:1.6;color:var(--ink)">Você planeja retirar <b>${BRL(mensal)}/mês</b> (${BRL(R.saqueAnual)}/ano), o que equivale a <b style="color:${cor}">${tx.toFixed(1)}% do seu patrimônio por ano</b>. A referência de mercado para uma renda durar décadas é em torno de <b>4% ao ano</b>.</p> <div style="position:relative;height:36px;border-radius:9px;background:rgba(143,217,204,.08);border:1px solid var(--line);overflow:hidden;margin-top:10px"> <div style="position:absolute;left:0;top:0;bottom:0;width:${safePct}%;background:rgba(52,211,153,.18);border-right:2px dashed var(--ok)"></div> <div style="position:absolute;left:${markPct}%;top:-2px;bottom:-2px;width:3px;background:${cor};box-shadow:0 0 10px ${cor}"></div> <span style="position:absolute;left:7px;top:9px;font-size:.64rem;color:#7fe0b8;font-weight:700">ZONA SEGURA ≤4%</span> <span style="position:absolute;left:calc(${markPct}% + 6px);top:9px;font-size:.66rem;color:${cor};font-weight:800">${tx.toFixed(1)}%</span> <span style="position:absolute;right:7px;bottom:5px;font-size:.62rem;color:var(--soft)">${scaleMax}%</span> </div> ${tx>4.5?`<p class="note" style="margin-top:8px;color:${cor};line-height:1.6">Sua taxa está <b>acima</b> da zona segura — esse é o principal motivo de a probabilidade ficar baixa. Reduzir a renda-alvo, aportar mais ou adiar a aposentadoria traz a taxa para perto de 4% e eleva bastante a chance de sucesso.</p>`:`<p class="note" style="margin-top:8px;color:var(--ok)">Sua taxa está dentro da zona segura.</p>`}
  </div>`;
}
function probExplain(p,R){
  const b=probBand(R.prob);
  return `<div class="panel"><h2>${ICN.spark} Entenda a sua probabilidade de sucesso</h2> <p style="font-size:.92rem;line-height:1.65;color:var(--ink)">Para projetar o seu futuro, não usamos um único “chute” de rentabilidade. Rodamos <b>centenas de simulações</b> do seu plano (o chamado método <b>Monte Carlo</b>): em cada uma, sorteamos uma sequência diferente de anos bons e ruins de mercado, de acordo com o seu perfil <b>${esc(p.perfil)}</b>. A sua <b>probabilidade de ${R.prob}%</b> é a fatia dessas simulações em que o patrimônio <b>durou até os ${p.vida} anos</b> sustentando a renda desejada de ${BRL((R.saqueAnual||0)/12)}/mês.</p> <div class="netrow" style="border:1px solid ${b.cor}55;border-radius:12px;padding:12px 14px;background:${b.cor}14;margin-top:6px"> <span style="display:flex;align-items:center;gap:10px"><span class="prob" style="background:${b.cor}22;color:${b.cor};border:1px solid ${b.cor}55">● ${R.prob}%</span><b style="color:${b.cor}">${b.t}</b></span></div> <p class="note" style="margin-top:8px;line-height:1.6">${b.d}</p> ${sakeBlock(p,R)}
    <div class="banner" style="border-color:var(--line);margin-top:14px"><span style="font-size:.88rem;line-height:1.6"> <b>Bater a meta na média não é o mesmo que ter segurança.</b> A cobertura (${R.cobertura}%) supõe um rendimento perfeito todo ano; a probabilidade (${R.prob}%) considera os altos e baixos reais do mercado. Quando a margem é pequena e o saque é alto, a probabilidade fica bem abaixo da cobertura — e é nela que confiamos.</span></div> <h3 class="serif" style="font-size:.98rem;color:var(--gold2);margin:18px 0 8px">As três linhas da projeção</h3> <div class="netrow"><span><span style="display:inline-block;width:16px;height:3px;background:#C5A059;vertical-align:middle;margin-right:8px"></span>Linha atual</span><span class="note" style="max-width:62%;text-align:right">Cenário com a rentabilidade real estimada para o seu perfil.</span></div> <div class="netrow"><span><span style="display:inline-block;width:16px;height:3px;background:#34d399;vertical-align:middle;margin-right:8px"></span>Otimista</span><span class="note" style="max-width:62%;text-align:right">Se os investimentos renderem acima do esperado.</span></div> <div class="netrow"><span><span style="display:inline-block;width:16px;height:3px;background:#f87171;vertical-align:middle;margin-right:8px"></span>Pessimista</span><span class="note" style="max-width:62%;text-align:right">Se renderem abaixo do esperado — o cenário de prudência.</span></div> <p class="note" style="margin-top:10px;line-height:1.6">A linha atual é a referência. Um plano saudável mantém a linha pessimista positiva pelo maior tempo possível — é isso que dá segurança real.</p> </div>`;
}

function seenTs(b){ return +(localStorage.getItem(seenKey(b))||0); }
function markSeen(b){ const it=bellData(b); const mx=it.reduce((m,x)=>x.noBadge?m:Math.max(m,x.ts),0); localStorage.setItem(seenKey(b),String(Math.max(mx,Date.now()))); }
function unread(b){ const s=seenTs(b); return bellData(b).filter(it=>!it.noBadge&&it.ts>s).length; }
function updateBell(){ const w=document.getElementById('bellWrap'); if(!w)return; if(session.role==='cliente'){w.innerHTML='';return;} try{ const bells=myBells(); const openB=w.querySelector('.notif'); const keep=openB?openB.getAttribute('data-b'):null; w.innerHTML='<div class="bells">'+bells.map(b=>{ const meta=BELLS[b]; const n=unread(b); const letter=b==='S'?'N':b; return '<button class="bell3" data-b="'+b+'" title="'+meta.lbl+'" aria-label="'+meta.lbl+'" style="--bc:'+meta.cor+'" onclick="toggleNotif(event,\''+b+'\')"><span>'+letter+'</span>'+(n?'<span class="badge">'+(n>9?'9+':n)+'</span>':'')+'</button>'; }).join('')+'</div>'; if(keep)renderNotif(keep); }catch(e){ w.innerHTML=''; } }
function toggleNotif(e,bell){ e&&e.stopPropagation(); const w=document.getElementById('bellWrap'); const open=w.querySelector('.notif'); const wasB=open?open.getAttribute('data-b'):null; if(open)open.remove(); if(wasB===bell)return; renderNotif(bell); markSeen(bell); const bd=w.querySelector('.bell3[data-b="'+bell+'"] .badge'); if(bd)bd.remove(); setTimeout(()=>document.addEventListener('click',closeNotifOnce),0); }
function renderNotif(bell){ const w=document.getElementById('bellWrap'); if(!w)return; const meta=BELLS[bell]; const items=bellData(bell); const s=seenTs(bell); const L=bell==='S'?'N':bell; const html='<div class="notif" data-b="'+bell+'" style="--bc:'+meta.cor+'"><h4><span class="nlet" style="background:'+meta.cor+'">'+L+'</span>'+esc(meta.lbl)+'<button class="nread" onclick="notifClear(\''+bell+'\')">marcar como lido</button></h4><div class="nlist">'+(items.length?items.map(it=>'<div class="ni'+((!it.noBadge&&it.ts>s)?' unread':'')+'" onclick="go(\''+it.go+'\');closeNotif()"><span class="dot" style="background:'+meta.cor+'22;color:'+meta.cor+'">'+L+'</span><div><div class="tx">'+it.tx+'</div><div class="tm">'+(it.who?esc(it.who):'')+(it.who&&it.ts?' · ':'')+(it.ts?esc(timeAgo(it.ts))+' · '+esc(fmtWhen(it.ts)):'')+'</div></div></div>').join(''):'<div class="empty">Tudo em dia ✓</div>')+'</div></div>'; w.insertAdjacentHTML('beforeend',html); }
function notifClear(bell){ markSeen(bell); closeNotif(); updateBell(); }
function closeNotif(){const n=document.querySelector('.notif');if(n)n.remove();}
function closeNotifOnce(e){const w=document.getElementById('bellWrap');if(w&&!w.contains(e.target)){closeNotif();document.removeEventListener('click',closeNotifOnce);}}
/* cria um gráfico de forma segura: se faltar canvas ou Chart.js, mostra aviso e nunca quebra o resto da página */
function ensureChartDefaults(){
  if(typeof Chart==='undefined'||Chart.__agion) return; Chart.__agion=1;
  const D=Chart.defaults;
  D.font.family="'DM Sans',system-ui,sans-serif"; D.color='#9DB5B1';
  D.maintainAspectRatio=false; D.responsive=true;
  D.animation={duration:850,easing:'easeOutQuart'};
  D.plugins.legend.labels.usePointStyle=true; D.plugins.legend.labels.pointStyle='circle';
  D.plugins.legend.labels.boxWidth=8; D.plugins.legend.labels.padding=14; D.plugins.legend.labels.color='#C9DEDB';
  const t=D.plugins.tooltip; t.backgroundColor='rgba(11,31,38,.96)'; t.borderColor='rgba(197,160,89,.55)'; t.borderWidth=1;
  t.titleColor='#F2FAF8'; t.bodyColor='#DCE9E7'; t.padding=11; t.cornerRadius=10; t.boxPadding=5; t.usePointStyle=true; t.titleFont={weight:'700',size:12}; t.bodyFont={size:12};
  D.elements.bar.borderRadius=8; D.elements.bar.borderSkipped=false;
  D.elements.line.tension=.35; D.elements.line.borderWidth=2.5;
  D.elements.point.radius=0; D.elements.point.hoverRadius=6; D.elements.point.hitRadius=14;
  D.elements.arc.borderWidth=0; D.elements.arc.hoverOffset=8;
  D.interaction={mode:'nearest',intersect:false};
}
function mkChart(id,cfg){
  const el=document.getElementById(id); if(!el) return;
  if(typeof Chart==='undefined'){ const d=document.createElement('div'); d.className='note'; d.style.cssText='padding:24px;text-align:center'; d.textContent='Gráfico indisponível (sem conexão para carregar a biblioteca).'; el.replaceWith(d); return; }
  ensureChartDefaults();
  try{ charts.push(new Chart(el,cfg)); }catch(e){ console.warn('chart '+id,e); }
}

function loginErr(m){const el=document.getElementById('loginMsg');el.textContent=m;el.style.color='var(--bad)';}
async function doLogin(){
  const email=(document.getElementById('logEmail').value||'').trim();
  const pass=document.getElementById('logPass').value;
  if(!email||!pass) return loginErr('Informe e-mail e senha.');
  if(!supa) return loginErr('Serviço de login indisponível. Recarregue a página.');
  const el=document.getElementById('loginMsg'); el.style.color='var(--muted)'; el.textContent='Entrando…';
  const {data,error}=await supa.auth.signInWithPassword({email,password:pass});
  if(error||!data||!data.user){return loginErr('E-mail ou senha incorretos.');}
  await startSession(data.user);
}
async function startSession(authUser){
  let prof=null;
  try{ const r=await supa.from('profiles').select('*').eq('id',authUser.id).single(); prof=r.data; }catch(e){}
  if(prof && prof.ativo===false){ try{ await supa.auth.signOut(); }catch(e){} const el=document.getElementById('loginMsg'); if(el)el.textContent='Esta conta está desativada. Procure o administrador.'; return; }
  const nome=(prof&&prof.nome)||authUser.email;
  const role=(prof&&prof.role)||'cliente';
  const me={id:authUser.id,role,nome,email:authUser.email,
    papel:(prof&&prof.papel)||ROLE_LBL[role]||'Cliente',leaderId:(prof&&prof.leader_id)||null,real:true,
    inicial:initialsOf(nome),cor:(prof&&prof.cor)||'#C5A059',ativo:true};
  if(!db.accounts.find(a=>a.id===me.id)) db.accounts.unshift(me);
  session={role,userId:me.id,clientId:null};
  if(role==='cliente'){ try{ const c=await supa.from('clientes').select('id').eq('user_id',authUser.id).limit(1); if(c.data&&c.data[0]) session.clientId=c.data[0].id; }catch(e){} }
  paintUser(me);
  const el=document.getElementById('loginMsg'); if(el)el.textContent='';
  await loadCloud();
  try{ startRealtime(); }catch(e){}
  try{ supa.rpc('log_event',{p_action:'LOGIN',p_entity:'app',p_descricao:'Entrou na plataforma',p_detalhes:{}}); }catch(e){}
  enterApp('dash');
  if(role==='cliente'){ try{ clienteWelcome(); }catch(e){} }
}

/* restaura sessão existente (entra direto no painel) e trata o link de redefinição de senha */
async function bootAuth(){
  if(!supa) return;
  try{
    supa.auth.onAuthStateChange(async (evt,sess)=>{
      if(evt==='PASSWORD_RECOVERY'){
        const nova=await ask({title:'Definir nova senha',msg:'Digite a sua nova senha (mínimo 6 caracteres):',input:true,ok:'Salvar'});
        if(nova){ const {error}=await supa.auth.updateUser({password:nova}); flash(error?'Não foi possível atualizar a senha.':'Senha atualizada!'); if(!error&&sess&&sess.user) await startSession(sess.user); }
      }
    });
    const params=new URLSearchParams(location.search);
    const {data}=await supa.auth.getSession();
    if(data&&data.session&&data.session.user){
      if(params.get('convite')){
        let nova=await ask({title:'Bem-vindo à Agion! Defina sua senha',msg:'Crie a senha de acesso (mínimo 6 caracteres):',input:true,ok:'Salvar e entrar'});
        while(nova!==null&&nova.trim().length<6){ nova=await ask({title:'Senha muito curta',msg:'Use pelo menos 6 caracteres:',input:true,ok:'Salvar e entrar'}); }
        if(nova){ const {error}=await supa.auth.updateUser({password:nova}); flash(error?'Não foi possível salvar a senha.':'Senha criada!'); }
        try{ history.replaceState(null,'',location.pathname); }catch(e){}
      }
      await startSession(data.session.user);
    }
  }catch(e){}
}

let _rtSub=null;
function startRealtime(){
  if(!supa||_rtSub) return;
  try{
    _rtSub=supa.channel('agion-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'mensagens'},function(pl){var m=pl.new;if(!m||!m.id||!db.chat)return;if((db.chat.messages||[]).some(function(x){return x.id===m.id}))return;db.chat.messages.push({id:m.id,canalId:m.canal_id,autorId:m.owner_id,texto:m.texto||'',quando:m.quando||Date.now()});db.chat.messages.sort(function(a,b){return a.quando-b.quando});save();if(view.page==='chat'){var el=document.getElementById('chatMsgs');if(el){el.innerHTML=chatMsgs();scrollChat();}}try{updateBell()}catch(e){}})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},function(pl){var p=pl.new;if(!p||!p.id)return;if((db.feed||[]).some(function(x){return x.id===p.id}))return;db.feed.push({id:p.id,autorId:p.owner_id,texto:p.texto||'',quando:p.quando||Date.now(),likes:p.likes||[],coments:p.coments||[]});save();if(view.page==='feed'){var el=document.getElementById('feedList');if(el)el.innerHTML=feedList();}try{updateBell()}catch(e){}})
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'posts'},function(pl){var p=pl.new;if(!p||!p.id)return;var ex=(db.feed||[]).find(function(x){return x.id===p.id});if(ex){ex.likes=p.likes||[];ex.coments=p.coments||[];if(p.texto)ex.texto=p.texto;save();if(view.page==='feed'){var el=document.getElementById('feedList');if(el)el.innerHTML=feedList();}}})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'inbox'},function(pl){var x=pl.new;if(!x||!x.id)return;if((db.inbox||[]).some(function(i){return i.id===x.id}))return;db.inbox.unshift({id:x.id,fonte:x.origem||'Web',nome:x.nome||'',contato:x.contato||'',campanha:x.campanha||'',tipo:x.tipo||'Consórcio',valor:+x.valor||0,quando:Date.now(),importado:!!x.convertido});save();if(view.page==='captacao'&&isStaff())renderCaptacao(document.getElementById('content'));try{updateBell()}catch(e){}})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'activity_log'},function(pl){var e=pl.new;if(!e||!e.id)return;db.actlog=db.actlog||[];if(db.actlog.some(function(x){return x.id===e.id}))return;db.actlog.unshift(e);if(db.actlog.length>150)db.actlog.pop();try{updateBell()}catch(_){}})
    .subscribe();
  }catch(e){}
}
function stopRealtime(){ try{ if(_rtSub){ supa.removeChannel(_rtSub); _rtSub=null; } }catch(e){} }

  opts.headers=Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+tok},opts.headers||{});

async function convOpen(phone){
  convState.phone=phone; convRenderList();
  const wr=document.getElementById('waRoot'); if(wr)wr.classList.add('showchat');
  const mn=document.getElementById('waMain'); if(mn)mn.innerHTML='<div class="wa-emp"><p class="note">Carregando…</p></div>';

  if(!r.ok){ if(mn)mn.innerHTML='<div class="wa-emp"><p class="note">Erro ao carregar.</p></div>'; return; }
  convState.msgs=r.data.mensagens||[]; convState.nome=r.data.nome;
  convMarkSeen(phone,convState.msgs.length?convState.msgs[convState.msgs.length-1].ts:Date.now()/1000);

}
async function convRefreshChat(){
  if(!convState.phone)return; const r=await apiFetch('/api/mensagens?phone='+encodeURIComponent(convState.phone)); if(!r.ok)return;
  const before=convState.msgs.length; convState.msgs=r.data.mensagens||[]; convState.nome=r.data.nome;
  if(convState.msgs.length!==before){ convMarkSeen(convState.phone,convState.msgs.length?convState.msgs[convState.msgs.length-1].ts:0); convRenderChat(); convRenderList(); }
}
function convRenderChat(){
  const mn=document.getElementById('waMain'); if(!mn)return;
  const nome=convState.nome||convFmtPhone(convState.phone);
  let body='',lastDay='';
  convState.msgs.forEach(function(m){
    const dk=convDayKey(m.ts); if(dk!==lastDay){ body+='<div class="wa-day">'+convDayLabel(m.ts)+'</div>'; lastDay=dk; }
    if(m.tipo==='sistema'){ body+='<div class="wa-b wa-sys">'+esc(m.texto||'')+'<div class="wa-mt">'+convTimeHM(m.ts)+'</div></div>'; return; }
    const mine=m.direction==='out';
    body+='<div class="wa-b '+(mine?'wa-out':'wa-in')+'">'+(mine&&m.autor&&m.autor!=='bot'?'<div class="wa-au">'+esc(m.autor)+'</div>':'')+esc(m.texto||'')+'<div class="wa-mt">'+convTimeHM(m.ts)+'</div></div>';
  });
  if(!body)body='<div class="wa-emp"><p class="note">Sem mensagens ainda. Diga olá! 👋</p></div>';
  mn.innerHTML='<div class="wa-chd"><button class="wa-back" onclick="convCloseChat()">‹</button><div class="wa-av" style="background:'+convColor(convState.phone)+'">'+esc(convInitials(nome))+'</div><div style="flex:1;min-width:0"><div class="wa-chd-nm">'+esc(nome)+'</div><div class="wa-chd-ph">'+convFmtPhone(convState.phone)+'</div></div><button class="wa-cico" title="Copiar número" onclick="convCopy()">⧉</button><button class="wa-cico" title="Mais ações" onclick="convMenu(event)">⋮</button></div><div class="wa-msgs" id="waMsgs">'+body+'</div><div class="wa-inp"><button class="wa-cico" title="Enviar template" onclick="convTplPicker()">🗂️</button><textarea id="waReply" rows="1" placeholder="Escreva uma mensagem…" oninput="convGrow(this)" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();convSend();}"></textarea><button class="wa-send" title="Enviar" onclick="convSend()">➤</button></div>';
  const b=document.getElementById('waMsgs'); if(b)b.scrollTop=b.scrollHeight;
}

function convApprovedOptions(){
  const appr={}; (convState.templates||[]).forEach(function(t){ if((t.status||'').toUpperCase()==='APPROVED') appr[t.name]=true; });
  let o=''; Object.keys(TPL_META).forEach(function(n){ if(appr[n]) o+='<option value="'+n+'">'+esc(TPL_META[n].label)+'</option>'; });
  return o||'<option value="">(nenhum template aprovado ainda)</option>';
}
async function convTplParams(tpl,nome){
  const meta=TPL_META[tpl]||{vars:[{k:'nome'}]}; const params=[];
  for(let i=0;i<meta.vars.length;i++){ const v=meta.vars[i];
    if(v.k==='nome'){ params.push(nome||'cliente'); }
    else{ const val=prompt(v.ask||('Valor de '+v.k+':'),''); if(val===null)return null; params.push(val); }
  }
  return params;
}

async function convDoNewChat(){
  const nome=(document.getElementById('ncNome').value||'').trim();
  const fone=convDig(document.getElementById('ncFone').value);
  const tpl=document.getElementById('ncTpl').value;
  if(!fone||fone.length<10){flash('Número inválido');return;}
  if(!tpl){flash('Nenhum template aprovado ainda');return;}
  const params=await convTplParams(tpl,nome); if(params===null)return;
  const r=await apiFetch('/api/send_template',{method:'POST',body:JSON.stringify({phone:fone,template:tpl,params:params,nome:nome})});
  if(!r.ok){flash('Falha: '+(r.data.error||r.status));return;}
  convCloseModal();flash('Conversa iniciada');
  await convLoadList();setTimeout(function(){convOpen(fone);},700);
}

}

function crmStats(){
  const L=visibleLeads();
  const ativos=L.filter(l=>!l.perdido && l.stage<CRM_STAGES.length-1);
  const fechados=L.filter(l=>!l.perdido && l.stage===CRM_STAGES.length-1);
  const perdidos=L.filter(l=>l.perdido);
  const pipeline=ativos.reduce((s,l)=>s+(+l.valor||0),0);
  const ganho=fechados.reduce((s,l)=>s+(+l.valor||0),0);
  const fechaveis=fechados.length+perdidos.length;
  const conv=fechaveis>0?Math.round(fechados.length/fechaveis*100):0;
  const porTipo={};TIPOS.forEach(t=>porTipo[t]=L.filter(l=>l.tipo===t&&!l.perdido).length);
  return {total:L.length,ativos:ativos.length,fechados:fechados.length,perdidos:perdidos.length,pipeline,ganho,conv,porTipo};
}
